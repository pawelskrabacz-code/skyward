<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyward</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --amber:     #C8923C;
  --amber-dim: rgba(200,146,60,0.3);
  --dark:      #2C2C3E;
  --dark2:     #080D14;
  --teal:      #5C8A7A;
  --off-white: #F8F6F2;
  --dim:       rgba(248,246,242,0.38);
  --dim2:      rgba(248,246,242,0.18);
  --panel-bg:  rgba(10,13,22,0.97);
  --border:    rgba(200,146,60,0.14);
  --border-hi: rgba(200,146,60,0.32);
}
html, body { width:100%; height:100%; overflow:hidden; background:#080D14; font-family:'DM Sans',sans-serif; color:var(--off-white); user-select:none; }

/* ──────────────── CANVAS ──────────────── */
#map-canvas { position:absolute; inset:0; cursor:grab; display:block; }
#map-canvas.dragging { cursor:grabbing; }

/* ──────────────── HUD ──────────────── */
#hud {
  position:absolute; top:0; left:0; right:0; height:52px;
  background:rgba(8,13,20,0.94); border-bottom:1px solid var(--border);
  backdrop-filter:blur(14px); display:flex; align-items:center;
  padding:0 18px; gap:0; z-index:100;
}
.hud-logo { font-family:'Montserrat',sans-serif; font-size:18px; letter-spacing:.05em; margin-right:22px; flex-shrink:0; }
.hud-logo .sky  { font-weight:800; color:var(--amber); }
.hud-logo .ward { font-weight:200; color:var(--off-white); }
.hud-sep { width:1px; height:28px; background:var(--border); flex-shrink:0; margin:0 16px; }
.hud-block { display:flex; flex-direction:column; gap:1px; min-width:70px; }
.hud-label { font-size:9px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); }
.hud-value { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700; color:var(--amber); letter-spacing:.02em; }
.hud-value.w { color:var(--off-white); }
.hud-value.t { color:var(--teal); }
.hud-value.sm { font-size:11px; font-weight:500; color:var(--off-white); letter-spacing:0; }
#hud-spacer { flex:1; }
.day-bar-wrap { width:70px; height:3px; background:rgba(200,146,60,0.13); border-radius:2px; overflow:hidden; margin-top:3px; }
.day-bar-fill { height:100%; background:var(--amber); border-radius:2px; transition:width 1s linear; }
.speed-controls { display:flex; gap:3px; align-items:center; margin-left:8px; }
.spd-btn { background:rgba(200,146,60,0.07); border:1px solid rgba(200,146,60,0.18); color:var(--dim); font-family:'Montserrat',sans-serif; font-size:9px; font-weight:700; letter-spacing:.05em; padding:3px 7px; border-radius:3px; cursor:pointer; transition:all .15s; }
.spd-btn:hover, .spd-btn.active { background:rgba(200,146,60,0.18); color:var(--amber); border-color:var(--amber); }

/* ──────────────── TOOLTIP ──────────────── */
#tooltip { position:absolute; pointer-events:none; z-index:200; opacity:0; transition:opacity .1s; }
#tooltip.vis { opacity:1; }
.tt-box { background:rgba(8,13,20,0.96); border:1px solid var(--border-hi); border-radius:6px; padding:9px 12px; min-width:155px; backdrop-filter:blur(8px); }
.tt-iata { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:800; color:var(--amber); letter-spacing:.08em; }
.tt-city { font-size:11px; color:var(--off-white); margin-top:1px; }
.tt-meta { font-size:9px; color:var(--dim); margin-top:5px; letter-spacing:.06em; text-transform:uppercase; line-height:1.6; }
.tt-meta .hl { color:var(--teal); }
.tt-hint { font-size:9px; color:rgba(200,146,60,0.55); margin-top:5px; font-style:italic; }

/* ──────────────── ZOOM + LEGEND ──────────────── */
#zoom-controls { position:absolute; bottom:24px; left:20px; z-index:100; display:flex; flex-direction:column; gap:4px; }
.zoom-btn { width:32px; height:32px; background:rgba(8,13,20,0.88); border:1px solid var(--border-hi); border-radius:6px; color:var(--amber); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; backdrop-filter:blur(8px); }
.zoom-btn:hover { background:rgba(200,146,60,0.14); border-color:var(--amber); }
#legend { position:absolute; bottom:24px; right:20px; z-index:100; background:rgba(8,13,20,0.88); border:1px solid var(--border); border-radius:8px; padding:10px 14px; display:flex; flex-direction:column; gap:6px; backdrop-filter:blur(8px); }
.lg-item { display:flex; align-items:center; gap:8px; font-size:9px; color:var(--dim); letter-spacing:.04em; }
.d1 { width:10px;height:10px;border-radius:50%;background:var(--amber);flex-shrink:0; }
.d2 { width:6px;height:6px;border-radius:50%;background:rgba(200,146,60,0.6);flex-shrink:0; }
.d3 { width:3px;height:3px;border-radius:50%;background:rgba(200,146,60,0.25);flex-shrink:0; }
.dp { width:8px;height:8px;border-radius:50%;border:2px solid var(--amber);background:var(--amber);flex-shrink:0; }
.dr { width:14px;height:2px;background:var(--teal);border-radius:1px;flex-shrink:0;opacity:.65; }

/* ──────────────── LOADING ──────────────── */
#loading { position:absolute; inset:0; background:#080D14; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
.ld-logo { font-family:'Montserrat',sans-serif; font-size:38px; letter-spacing:.1em; }
.ld-logo .sky { font-weight:800; color:var(--amber); }
.ld-logo .ward { font-weight:200; color:var(--off-white); }
.ld-msg { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--dim); }
.ld-bar-o { width:180px; height:2px; background:rgba(200,146,60,0.13); border-radius:1px; overflow:hidden; }
.ld-bar-i { height:100%; background:var(--amber); border-radius:1px; width:0; transition:width .4s ease; }

/* ──────────────── AIRPORT PANEL ──────────────── */
#ap-panel {
  position:absolute; top:52px; right:0; bottom:0; width:400px;
  background:var(--panel-bg); border-left:1px solid var(--border-hi);
  z-index:300; display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
#ap-panel.open { transform:translateX(0); }
#ap-panel-close {
  position:absolute; top:14px; right:14px; width:28px; height:28px;
  background:rgba(200,146,60,0.09); border:1px solid var(--border-hi);
  border-radius:5px; color:var(--amber); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
#ap-panel-close:hover { background:rgba(200,146,60,0.2); }

/* Panel header */
.ap-header { padding:18px 20px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.ap-header-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; }
.ap-iata { font-family:'Montserrat',sans-serif; font-size:30px; font-weight:800; color:var(--amber); letter-spacing:.08em; line-height:1; }
.ap-meta { display:flex; flex-direction:column; gap:2px; padding-top:4px; }
.ap-city { font-size:13px; font-weight:500; color:var(--off-white); }
.ap-country { font-size:10px; color:var(--dim); letter-spacing:.04em; text-transform:uppercase; }
.ap-badges { display:flex; gap:5px; flex-wrap:wrap; }
.badge { display:inline-flex; align-items:center; font-family:'Montserrat',sans-serif; font-size:8px; font-weight:700; letter-spacing:.1em; padding:3px 7px; border-radius:3px; text-transform:uppercase; border:1px solid; }
.badge-amber  { color:var(--amber); border-color:rgba(200,146,60,0.45); background:rgba(200,146,60,0.09); }
.badge-teal   { color:var(--teal);  border-color:rgba(92,138,122,0.45);  background:rgba(92,138,122,0.09); }
.badge-green  { color:#4caf7d;      border-color:rgba(76,175,125,0.45);  background:rgba(76,175,125,0.08); }
.badge-dim    { color:var(--dim);   border-color:rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); }
.badge-star   { color:#a0c4ff;      border-color:rgba(160,196,255,0.4);  background:rgba(160,196,255,0.07); }
.badge-sky    { color:#80d4e4;      border-color:rgba(128,212,228,0.4);  background:rgba(128,212,228,0.07); }
.badge-one    { color:#ffb347;      border-color:rgba(255,179,71,0.4);   background:rgba(255,179,71,0.07); }

/* Tabs */
.ap-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
.ap-tab { flex:1; padding:10px 4px; font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; transition:all .15s; text-align:center; }
.ap-tab:hover { color:var(--off-white); }
.ap-tab.active { color:var(--amber); border-bottom-color:var(--amber); }

/* Tab content */
.ap-body { flex:1; overflow-y:auto; padding:0; scrollbar-width:thin; scrollbar-color:rgba(200,146,60,0.2) transparent; }
.ap-body::-webkit-scrollbar { width:4px; }
.ap-body::-webkit-scrollbar-thumb { background:rgba(200,146,60,0.2); border-radius:2px; }
.tab-pane { display:none; padding:16px 20px 20px; }
.tab-pane.active { display:block; }

/* Overview grid */
.ov-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-bottom:14px; }
.ov-cell { background:#0a0d16; padding:10px 12px; }
.ov-key { font-size:8px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
.ov-val { font-family:'Montserrat',sans-serif; font-size:14px; font-weight:700; color:var(--off-white); }
.ov-val.am { color:var(--amber); }
.ov-val.tl { color:var(--teal); }

/* Section heading */
.sec-head { font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:8px; margin-top:14px; }
.sec-head:first-child { margin-top:0; }

/* Airlines list */
.airline-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
.airline-row:last-child { border-bottom:none; }
.al-code { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:800; color:var(--amber); min-width:30px; }
.al-info { flex:1; }
.al-name { font-size:11px; font-weight:500; color:var(--off-white); }
.al-sub  { font-size:9px; color:var(--dim); margin-top:1px; }
.al-count { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; color:var(--teal); text-align:right; min-width:24px; }
.al-owned { font-size:8px; color:var(--amber); font-weight:700; letter-spacing:.08em; text-align:right; }

/* Destinations list */
.dest-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(200,146,60,0.07); }
.dest-row:last-child { border-bottom:none; }
.dest-iata { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:800; color:var(--off-white); min-width:34px; }
.dest-info { flex:1; }
.dest-city { font-size:10px; color:var(--dim); }
.dest-carriers { font-size:8px; color:rgba(200,146,60,0.5); margin-top:1px; }
.dest-earn { text-align:right; }
.dest-earn-val { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; color:var(--teal); }
.dest-dist { font-size:8px; color:var(--dim); margin-top:1px; text-align:right; }
.dest-unlocked { font-size:8px; color:#4caf7d; letter-spacing:.07em; font-weight:700; }

/* Fleet list */
.fleet-group { margin-bottom:14px; }
.fleet-mfr { font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid rgba(255,255,255,0.05); }
.fleet-row { display:flex; align-items:center; gap:10px; padding:5px 0; }
.fleet-code { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; color:var(--amber); min-width:38px; }
.fleet-name { font-size:10px; color:var(--off-white); flex:1; }
.fleet-type { font-size:8px; color:var(--dim); }
.fleet-cnt  { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; color:var(--dim); min-width:22px; text-align:right; }

/* Actions */
.action-btn {
  display:flex; align-items:center; gap:12px; width:100%; padding:12px 14px;
  background:rgba(200,146,60,0.06); border:1px solid rgba(200,146,60,0.18);
  border-radius:6px; color:var(--off-white); cursor:pointer; transition:all .15s;
  margin-bottom:8px; text-align:left;
}
.action-btn:hover { background:rgba(200,146,60,0.13); border-color:rgba(200,146,60,0.4); }
.action-btn.primary { background:rgba(200,146,60,0.14); border-color:rgba(200,146,60,0.5); }
.action-btn.primary:hover { background:rgba(200,146,60,0.22); }
.action-btn.teal-btn { background:rgba(92,138,122,0.08); border-color:rgba(92,138,122,0.25); }
.action-btn.teal-btn:hover { background:rgba(92,138,122,0.16); border-color:rgba(92,138,122,0.5); }
.action-icon { font-size:18px; line-height:1; width:24px; flex-shrink:0; }
.action-content { flex:1; }
.action-title { font-size:12px; font-weight:600; color:var(--off-white); margin-bottom:2px; }
.action-desc  { font-size:10px; color:var(--dim); }
.action-cost  { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; color:var(--amber); flex-shrink:0; }
.action-cost.green { color:#4caf7d; }

.context-block { background:rgba(200,146,60,0.06); border:1px solid var(--border); border-radius:6px; padding:12px 14px; margin-bottom:14px; }
.context-label { font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:6px; }
.context-val { font-size:12px; color:var(--off-white); }
.context-val .hl { color:var(--amber); font-weight:600; }

.empty-state { text-align:center; padding:30px 0; color:var(--dim); font-size:11px; }
.tab-count { display:inline-block; background:rgba(200,146,60,0.18); color:var(--amber); border-radius:10px; font-size:8px; font-weight:700; padding:1px 5px; margin-left:4px; font-family:'Montserrat',sans-serif; }

@keyframes celebIn {
  from { opacity:0; transform:scale(0.88) translateY(20px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

#unlock-overlay {
  position:absolute; inset:0; z-index:500;
  background:rgba(4,7,12,0.82);
  backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .22s;
}
#unlock-overlay.open { opacity:1; pointer-events:all; }

#unlock-modal {
  width:460px; max-width:96vw; max-height:88vh;
  background:#0a0d16;
  border:1px solid rgba(200,146,60,0.35);
  border-radius:12px;
  display:flex; flex-direction:column;
  overflow:hidden;
  transform:translateY(16px) scale(0.97);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
  box-shadow:0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(200,146,60,0.08);
}
#unlock-overlay.open #unlock-modal { transform:translateY(0) scale(1); }

/* Modal header */
.um-header {
  padding:20px 24px 16px;
  border-bottom:1px solid rgba(200,146,60,0.12);
  display:flex; align-items:flex-start; justify-content:space-between;
  flex-shrink:0;
}
.um-header-left {}
.um-eyebrow {
  font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--amber); margin-bottom:5px;
}
.um-title {
  font-family:'Montserrat',sans-serif; font-size:22px; font-weight:800;
  color:var(--off-white); letter-spacing:.02em; display:flex; align-items:center; gap:10px;
}
.um-title .arrow { color:var(--amber); font-size:16px; }
.um-close {
  width:30px; height:30px; background:rgba(200,146,60,0.07);
  border:1px solid rgba(200,146,60,0.2); border-radius:5px;
  color:var(--amber); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0; margin-left:16px; margin-top:2px;
}
.um-close:hover { background:rgba(200,146,60,0.18); }

/* Modal body */
.um-body { overflow-y:auto; scrollbar-width:thin; scrollbar-color:rgba(200,146,60,0.18) transparent; }
.um-body::-webkit-scrollbar { width:3px; }
.um-body::-webkit-scrollbar-thumb { background:rgba(200,146,60,0.18); border-radius:2px; }

/* Route list view */
#um-route-list { padding:14px 20px; }
.um-section-head {
  font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--dim); margin-bottom:8px; margin-top:14px;
}
.um-section-head:first-child { margin-top:0; }

.route-card {
  display:flex; align-items:center; gap:12px;
  padding:11px 14px; border:1px solid rgba(200,146,60,0.14);
  border-radius:7px; cursor:pointer; margin-bottom:6px;
  background:rgba(200,146,60,0.04); transition:all .15s;
}
.route-card:hover { background:rgba(200,146,60,0.1); border-color:rgba(200,146,60,0.35); }
.route-card.unlocked { opacity:0.42; cursor:default; }
.route-card.cant-afford { border-color:rgba(200,146,60,0.1); }
.rc-airports {
  font-family:'Montserrat',sans-serif; font-weight:800; font-size:13px;
  color:var(--off-white); white-space:nowrap; flex-shrink:0;
}
.rc-airports .ar { color:var(--amber); font-size:10px; margin:0 4px; }
.rc-body { flex:1; min-width:0; }
.rc-airline { font-size:9px; color:var(--dim); letter-spacing:.04em; margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rc-aircraft { font-size:9px; color:rgba(200,146,60,0.55); }
.rc-right { text-align:right; flex-shrink:0; }
.rc-earn { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; color:var(--teal); }
.rc-cost { font-size:9px; color:var(--dim); margin-top:1px; }
.rc-tag {
  font-size:7px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  padding:2px 5px; border-radius:3px; margin-left:6px;
}
.rc-tag-done  { background:rgba(76,175,125,0.14); color:#4caf7d; border:1px solid rgba(76,175,125,0.3); }
.rc-tag-broke { background:rgba(200,146,60,0.08); color:rgba(200,146,60,0.45); border:1px solid rgba(200,146,60,0.18); }

/* Detail view */
#um-detail { padding:20px 24px; display:none; }

.um-route-hero {
  display:flex; align-items:center; justify-content:center; gap:14px;
  padding:20px 0 18px;
  border-bottom:1px solid rgba(200,146,60,0.1); margin-bottom:18px;
}
.um-ap-block { text-align:center; }
.um-ap-code {
  font-family:'Montserrat',sans-serif; font-size:36px; font-weight:800;
  color:var(--amber); letter-spacing:.04em; line-height:1;
}
.um-ap-city { font-size:10px; color:var(--dim); margin-top:3px; letter-spacing:.04em; }
.um-arrow-big { color:rgba(200,146,60,0.4); font-size:20px; padding-bottom:14px; }

/* Stats grid */
.um-stats {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:1px; background:rgba(200,146,60,0.1);
  border:1px solid rgba(200,146,60,0.14); border-radius:7px;
  overflow:hidden; margin-bottom:16px;
}
.um-stat { background:#0a0d16; padding:10px 12px; }
.um-stat-k { font-size:8px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
.um-stat-v { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:800; color:var(--off-white); }
.um-stat-v.am { color:var(--amber); }
.um-stat-v.tl { color:var(--teal); }
.um-stat-v.gr { color:#4caf7d; }

/* Payback bar */
.payback-wrap { margin-bottom:16px; }
.payback-label { display:flex; justify-content:space-between; font-size:9px; color:var(--dim); letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; }
.payback-bar-outer { height:6px; background:rgba(200,146,60,0.1); border-radius:3px; overflow:hidden; }
.payback-bar-inner { height:100%; background:linear-gradient(90deg,var(--teal),var(--amber)); border-radius:3px; transition:width .6s ease; }
.payback-note { font-size:9px; color:var(--dim); margin-top:4px; text-align:right; }

/* Balance block */
.um-balance-block {
  background:rgba(200,146,60,0.06); border:1px solid rgba(200,146,60,0.16);
  border-radius:7px; padding:12px 14px; margin-bottom:16px;
}
.um-balance-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.um-balance-row:last-child { margin-bottom:0; }
.um-balance-k { font-size:9px; color:var(--dim); letter-spacing:.08em; text-transform:uppercase; }
.um-balance-v { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700; }
.um-balance-v.amber { color:var(--amber); }
.um-balance-v.green { color:#4caf7d; }
.um-balance-v.red   { color:#e05a4e; }
.um-balance-divider { height:1px; background:rgba(200,146,60,0.1); margin:6px 0; }

/* Can't afford block */
.um-broke-block {
  background:rgba(224,90,78,0.07); border:1px solid rgba(224,90,78,0.25);
  border-radius:7px; padding:12px 14px; margin-bottom:16px;
}
.um-broke-title { font-size:10px; font-weight:600; color:#e05a4e; margin-bottom:4px; }
.um-broke-body  { font-size:10px; color:var(--dim); line-height:1.5; }
.um-broke-body strong { color:var(--off-white); }

/* Location block */
.um-location-block {
  background:rgba(224,90,78,0.07); border:1px solid rgba(224,90,78,0.25);
  border-radius:7px; padding:14px 16px; margin-bottom:16px; text-align:center;
}
.um-location-icon { font-size:28px; margin-bottom:8px; }
.um-location-title { font-size:13px; font-weight:600; color:#e05a4e; margin-bottom:4px; }
.um-location-body  { font-size:10px; color:var(--dim); line-height:1.6; }
.um-location-body strong { color:var(--off-white); }

/* Modal footer */
.um-footer {
  padding:14px 24px 20px;
  border-top:1px solid rgba(200,146,60,0.1);
  display:flex; gap:10px; flex-shrink:0;
}
.um-btn {
  flex:1; padding:12px 16px; border-radius:7px; font-family:'DM Sans',sans-serif;
  font-size:12px; font-weight:600; cursor:pointer; transition:all .18s; border:1px solid;
  letter-spacing:.02em;
}
.um-btn-cancel {
  background:transparent; border-color:rgba(200,146,60,0.2); color:var(--dim);
}
.um-btn-cancel:hover { border-color:rgba(200,146,60,0.4); color:var(--off-white); }
.um-btn-confirm {
  background:rgba(200,146,60,0.18); border-color:rgba(200,146,60,0.5); color:var(--amber);
  font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700; letter-spacing:.06em;
}
.um-btn-confirm:hover { background:rgba(200,146,60,0.3); border-color:var(--amber); }
.um-btn-confirm:disabled { opacity:0.35; cursor:not-allowed; }
.um-btn-back {
  flex:0 0 auto; padding:12px 14px; background:transparent;
  border-color:rgba(200,146,60,0.15); color:var(--dim);
}
.um-btn-back:hover { color:var(--off-white); border-color:rgba(200,146,60,0.3); }

/* ──────────────── ANIMATED ARC CANVAS ──────────────── */
#arc-canvas {
  position:absolute; inset:0; pointer-events:none; z-index:90;
}

/* ──────────────── TOAST SYSTEM ──────────────── */
#toast-container {
  position:absolute; top:66px; left:50%; transform:translateX(-50%);
  z-index:600; display:flex; flex-direction:column; gap:8px;
  pointer-events:none; width:340px;
}
.toast {
  background:rgba(8,13,20,0.96); border:1px solid;
  border-radius:8px; padding:12px 16px;
  display:flex; align-items:flex-start; gap:12px;
  animation:toastIn .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(12px);
  pointer-events:all;
}
.toast.success { border-color:rgba(76,175,125,0.5); }
.toast.warning { border-color:rgba(224,90,78,0.4); }
.toast.info    { border-color:rgba(200,146,60,0.4); }
.toast-icon { font-size:18px; line-height:1; margin-top:1px; flex-shrink:0; }
.toast-body {}
.toast-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.toast.success .toast-title { color:#4caf7d; }
.toast.warning .toast-title { color:#e05a4e; }
.toast.info    .toast-title { color:var(--amber); }
.toast-msg { font-size:10px; color:var(--dim); line-height:1.4; }
.toast-close { margin-left:auto; font-size:11px; color:var(--dim); cursor:pointer; flex-shrink:0; padding-left:8px; }
.toast-close:hover { color:var(--off-white); }
@keyframes toastIn {
  from { opacity:0; transform:translateY(-10px) scale(0.96); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes toastOut {
  from { opacity:1; transform:translateY(0); max-height:100px; margin-bottom:0; }
  to   { opacity:0; transform:translateY(-8px); max-height:0; margin-bottom:-8px; }
}
.toast.dying { animation:toastOut .25s ease forwards; }

/* First route celebration */
#celebration {
  position:absolute; inset:0; z-index:700;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0;
}
#celebration.show { opacity:1; }
.celeb-card {
  background:#0a0d16; border:1px solid rgba(200,146,60,0.5);
  border-radius:14px; padding:36px 48px; text-align:center;
  max-width:360px; pointer-events:all;
  box-shadow:0 40px 100px rgba(0,0,0,0.8);
  animation:celebIn .4s cubic-bezier(.4,0,.2,1);
}
.celeb-icon { font-size:40px; margin-bottom:14px; }
.celeb-title { font-family:'Montserrat',sans-serif; font-size:22px; font-weight:800; color:var(--amber); margin-bottom:8px; }
.celeb-body  { font-size:12px; color:var(--dim); line-height:1.6; margin-bottom:20px; }
.celeb-route { font-family:'Montserrat',sans-serif; font-size:18px; font-weight:800; color:var(--off-white); margin-bottom:4px; }
.celeb-earn  { font-size:11px; color:var(--teal); letter-spacing:.04em; margin-bottom:20px; }
.celeb-dismiss { background:rgba(200,146,60,0.14); border:1px solid rgba(200,146,60,0.4); color:var(--amber); font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; padding:10px 24px; border-radius:6px; cursor:pointer; transition:all .15s; }
.celeb-dismiss:hover { background:rgba(200,146,60,0.25); }
/* ──────────────── ACQUISITION MODAL ──────────────── */
#acq-overlay {
  position:absolute; inset:0; z-index:500;
  background:rgba(4,7,12,0.85);
  backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .22s;
}
#acq-overlay.open { opacity:1; pointer-events:all; }

#acq-modal {
  width:540px; max-width:96vw; max-height:88vh;
  background:#08090f;
  border:1px solid rgba(200,146,60,0.35);
  border-radius:14px;
  display:flex; flex-direction:column;
  overflow:hidden;
  transform:translateY(18px) scale(0.97);
  transition:transform .24s cubic-bezier(.4,0,.2,1);
  box-shadow:0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(200,146,60,0.06);
}
#acq-overlay.open #acq-modal { transform:translateY(0) scale(1); }

/* Adjacency block */
#acq-adjacency-block {
  background:#08090f; border:1px solid rgba(224,90,78,0.3);
  border-radius:14px; padding:36px 40px; max-width:460px; text-align:center;
  transform:translateY(18px) scale(0.97);
  transition:transform .24s cubic-bezier(.4,0,.2,1);
  box-shadow:0 40px 100px rgba(0,0,0,0.8);
}
#acq-overlay.open #acq-adjacency-block { transform:translateY(0) scale(1); }
.adj-icon  { font-size:36px; margin-bottom:14px; }
.adj-title { font-family:'Montserrat',sans-serif; font-size:18px; font-weight:800; color:#e05a4e; margin-bottom:8px; }
.adj-body  { font-size:11px; color:var(--dim); line-height:1.7; margin-bottom:20px; }
.adj-body strong { color:var(--off-white); }
.adj-btn   { background:rgba(224,90,78,0.12); border:1px solid rgba(224,90,78,0.35); color:#e05a4e; font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; padding:10px 22px; border-radius:6px; cursor:pointer; transition:all .15s; }
.adj-btn:hover { background:rgba(224,90,78,0.22); }

/* Feasibility header */
.acq-topbar {
  background:rgba(200,146,60,0.06);
  border-bottom:1px solid rgba(200,146,60,0.15);
  padding:18px 24px 14px;
  flex-shrink:0;
  display:flex; align-items:flex-start; justify-content:space-between;
}
.acq-eyebrow { font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--amber); margin-bottom:5px; }
.acq-name    { font-family:'Montserrat',sans-serif; font-size:20px; font-weight:800; color:var(--off-white); margin-bottom:4px; }
.acq-sub     { font-size:10px; color:var(--dim); }
.acq-close   { width:30px; height:30px; background:rgba(200,146,60,0.07); border:1px solid rgba(200,146,60,0.2); border-radius:5px; color:var(--amber); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; margin-left:16px; margin-top:2px; }
.acq-close:hover { background:rgba(200,146,60,0.18); }

/* Doc body */
.acq-body { overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:rgba(200,146,60,0.15) transparent; }
.acq-body::-webkit-scrollbar { width:3px; }
.acq-body::-webkit-scrollbar-thumb { background:rgba(200,146,60,0.18); border-radius:2px; }

/* Doc section */
.doc-section { border-bottom:1px solid rgba(200,146,60,0.1); padding:16px 24px; }
.doc-section:last-child { border-bottom:none; }
.doc-section-head {
  font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--amber); margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.doc-section-head::after { content:''; flex:1; height:1px; background:rgba(200,146,60,0.15); }

/* Investment summary grid */
.inv-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(200,146,60,0.1); border:1px solid rgba(200,146,60,0.15); border-radius:7px; overflow:hidden; }
.inv-cell { background:#08090f; padding:10px 14px; }
.inv-cell.full { grid-column:1/-1; }
.inv-k { font-size:8px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
.inv-v { font-family:'Montserrat',sans-serif; font-size:16px; font-weight:800; color:var(--off-white); }
.inv-v.am { color:var(--amber); }
.inv-v.gr { color:#4caf7d; }
.inv-v.rd { color:#e05a4e; }
.inv-v.tl { color:var(--teal); }
.inv-v.sm { font-size:12px; }

/* Category badge */
.cat-badge { display:inline-flex; align-items:center; font-family:'Montserrat',sans-serif; font-size:8px; font-weight:700; letter-spacing:.1em; padding:3px 8px; border-radius:3px; text-transform:uppercase; border:1px solid; margin-left:8px; vertical-align:middle; }
.cat-S { color:#80d4e4; border-color:rgba(128,212,228,0.4); background:rgba(128,212,228,0.07); }
.cat-M { color:var(--amber); border-color:rgba(200,146,60,0.35); background:rgba(200,146,60,0.08); }
.cat-L { color:#c084fc; border-color:rgba(192,132,252,0.4); background:rgba(192,132,252,0.07); }

/* Revenue rows */
.rev-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(200,146,60,0.07); }
.rev-row:last-child { border-bottom:none; }
.rev-route { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:800; color:var(--off-white); min-width:70px; white-space:nowrap; }
.rev-route .ar { color:var(--amber); font-size:9px; margin:0 3px; }
.rev-info  { flex:1; font-size:9px; color:var(--dim); }
.rev-earn  { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; color:var(--teal); text-align:right; }
.rev-total-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:rgba(92,138,122,0.08); border:1px solid rgba(92,138,122,0.2); border-radius:6px; margin-top:10px; }
.rev-total-k { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--teal); }
.rev-total-v { font-family:'Montserrat',sans-serif; font-size:16px; font-weight:800; color:var(--teal); }

/* Payback */
.payback-mini { display:flex; justify-content:space-between; font-size:9px; color:var(--dim); margin-top:8px; padding-top:8px; border-top:1px solid rgba(200,146,60,0.08); }
.payback-mini strong { color:var(--off-white); }

/* Network */
.net-hub-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.hub-chip { font-family:'Montserrat',sans-serif; font-size:10px; font-weight:700; background:rgba(200,146,60,0.1); border:1px solid rgba(200,146,60,0.25); color:var(--amber); padding:3px 9px; border-radius:4px; }
.hub-chip.focus { background:rgba(92,138,122,0.08); border-color:rgba(92,138,122,0.25); color:var(--teal); }
.net-stat-row { display:flex; gap:1px; background:rgba(200,146,60,0.08); border:1px solid rgba(200,146,60,0.12); border-radius:6px; overflow:hidden; margin-top:10px; }
.net-stat { flex:1; background:#08090f; padding:8px 10px; text-align:center; }
.net-stat-v { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:800; color:var(--off-white); }
.net-stat-k { font-size:7px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-top:2px; }

/* Connection points */
.conn-chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.conn-chip { font-size:9px; background:rgba(76,175,125,0.1); border:1px solid rgba(76,175,125,0.3); color:#4caf7d; padding:3px 8px; border-radius:3px; font-family:'Montserrat',sans-serif; font-weight:700; }

/* Fleet */
.fleet-type-group { margin-bottom:12px; }
.fleet-type-label { font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:5px; }
.fleet-chips { display:flex; flex-wrap:wrap; gap:4px; }
.fleet-chip { font-size:9px; background:rgba(200,146,60,0.07); border:1px solid rgba(200,146,60,0.18); color:var(--off-white); padding:3px 7px; border-radius:3px; }
.fleet-chip span { color:var(--dim); font-size:8px; }

/* Alliance block */
.alliance-block { display:flex; align-items:center; gap:14px; padding:12px 14px; background:rgba(200,146,60,0.05); border:1px solid rgba(200,146,60,0.14); border-radius:7px; }
.alliance-badge-big { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; letter-spacing:.08em; padding:6px 14px; border-radius:5px; border:1px solid; }
.all-star { color:#a0c4ff; border-color:rgba(160,196,255,0.45); background:rgba(160,196,255,0.08); }
.all-sky  { color:#80d4e4; border-color:rgba(128,212,228,0.45); background:rgba(128,212,228,0.08); }
.all-one  { color:#ffb347; border-color:rgba(255,179,71,0.45);  background:rgba(255,179,71,0.08); }
.all-none { color:var(--dim); border-color:rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); }
.alliance-info { flex:1; }
.alliance-name { font-size:12px; font-weight:600; color:var(--off-white); margin-bottom:2px; }
.alliance-note { font-size:9px; color:var(--dim); }

/* Acquisition footer */
.acq-footer {
  padding:16px 24px 20px;
  border-top:1px solid rgba(200,146,60,0.12);
  flex-shrink:0;
}
.acq-footer-balance { display:flex; justify-content:space-between; margin-bottom:10px; font-size:10px; color:var(--dim); }
.acq-footer-balance strong { color:var(--off-white); }
.acq-footer-balance .after-val { font-family:'Montserrat',sans-serif; font-weight:700; font-size:12px; }
.acq-footer-buttons { display:flex; gap:10px; }
.acq-btn-cancel  { flex:0 0 auto; padding:12px 18px; background:transparent; border:1px solid rgba(200,146,60,0.2); color:var(--dim); border-radius:7px; cursor:pointer; font-size:12px; transition:all .15s; }
.acq-btn-cancel:hover { border-color:rgba(200,146,60,0.4); color:var(--off-white); }
.acq-btn-acquire {
  flex:1; padding:14px 20px;
  background:linear-gradient(135deg, rgba(200,146,60,0.22), rgba(200,146,60,0.14));
  border:1px solid rgba(200,146,60,0.55); color:var(--amber);
  border-radius:7px; cursor:pointer; font-family:'Montserrat',sans-serif;
  font-size:13px; font-weight:800; letter-spacing:.08em;
  transition:all .2s;
}
.acq-btn-acquire:hover { background:linear-gradient(135deg,rgba(200,146,60,0.35),rgba(200,146,60,0.22)); box-shadow:0 0 20px rgba(200,146,60,0.2); }
.acq-btn-acquire:disabled { opacity:0.3; cursor:not-allowed; box-shadow:none; }

/* Acquisition celebration */
#acq-celebration {
  position:absolute; inset:0; z-index:800;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; background:rgba(4,7,12,0.82);
  backdrop-filter:blur(6px); transition:opacity .3s;
}
#acq-celebration.show { opacity:1; pointer-events:all; }
.acq-celeb-card {
  background:#08090f; border:1px solid rgba(200,146,60,0.5);
  border-radius:16px; padding:40px 50px; text-align:center; max-width:400px;
  box-shadow:0 40px 100px rgba(0,0,0,0.8), 0 0 60px rgba(200,146,60,0.12);
  animation:celebIn .4s cubic-bezier(.4,0,.2,1);
  position:relative; overflow:hidden;
}
.acq-celeb-card::before {
  content:''; position:absolute; inset:0; opacity:0.03;
  background:repeating-linear-gradient(45deg,var(--amber) 0,var(--amber) 1px,transparent 1px,transparent 8px);
}
.acq-celeb-icon  { font-size:44px; margin-bottom:16px; }
.acq-celeb-pre   { font-size:9px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--amber); margin-bottom:8px; }
.acq-celeb-title { font-family:'Montserrat',sans-serif; font-size:20px; font-weight:800; color:var(--off-white); margin-bottom:6px; }
.acq-celeb-name  { font-family:'Montserrat',sans-serif; font-size:26px; font-weight:800; color:var(--amber); margin-bottom:4px; }
.acq-celeb-code  { font-size:10px; color:var(--dim); letter-spacing:.1em; margin-bottom:20px; }
.acq-celeb-msg   { font-size:11px; color:var(--dim); line-height:1.7; margin-bottom:6px; }
.acq-celeb-earn  { font-family:'Montserrat',sans-serif; font-size:14px; font-weight:700; color:var(--teal); margin-bottom:24px; }
.acq-celeb-dismiss { background:rgba(200,146,60,0.14); border:1px solid rgba(200,146,60,0.4); color:var(--amber); font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; padding:11px 28px; border-radius:7px; cursor:pointer; transition:all .15s; }
.acq-celeb-dismiss:hover { background:rgba(200,146,60,0.26); }

/* ══════════════════════════════════════════════════════
   PHASE 5 — BOOKING · BOARDING PASS · FLIGHT TRACKER
   ══════════════════════════════════════════════════════ */

/* Booking overlay */
#book-overlay {
  position:absolute; inset:0; z-index:500;
  background:rgba(4,7,12,0.84); backdrop-filter:blur(7px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
#book-overlay.open { opacity:1; pointer-events:all; }
#book-modal {
  width:500px; max-width:96vw; max-height:88vh;
  background:#09090f; border:1px solid rgba(200,146,60,0.32);
  border-radius:14px; display:flex; flex-direction:column; overflow:hidden;
  transform:translateY(14px) scale(0.97);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
  box-shadow:0 36px 90px rgba(0,0,0,0.85);
}
#book-overlay.open #book-modal { transform:none; }

/* Booking header */
.bk-header { padding:18px 22px 14px; border-bottom:1px solid rgba(200,146,60,0.12); flex-shrink:0; display:flex; align-items:flex-start; justify-content:space-between; }
.bk-eyebrow { font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--amber); margin-bottom:5px; }
.bk-route-hero { display:flex; align-items:center; gap:10px; }
.bk-ap { font-family:'Montserrat',sans-serif; font-size:26px; font-weight:800; color:var(--off-white); letter-spacing:.04em; }
.bk-arrow { color:var(--amber); font-size:14px; }
.bk-close { width:28px; height:28px; background:rgba(200,146,60,0.07); border:1px solid rgba(200,146,60,0.2); border-radius:5px; color:var(--amber); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.bk-close:hover { background:rgba(200,146,60,0.18); }

/* Destination selector (when from=current, no dest yet) */
.bk-dest-grid { padding:14px 22px; display:grid; grid-template-columns:1fr 1fr; gap:6px; overflow-y:auto; max-height:400px; scrollbar-width:thin; scrollbar-color:rgba(200,146,60,0.15) transparent; }
.dest-btn { background:rgba(200,146,60,0.05); border:1px solid rgba(200,146,60,0.14); border-radius:6px; padding:10px 12px; cursor:pointer; transition:all .14s; text-align:left; }
.dest-btn:hover { background:rgba(200,146,60,0.12); border-color:rgba(200,146,60,0.35); }
.dest-btn-iata { font-family:'Montserrat',sans-serif; font-size:14px; font-weight:800; color:var(--amber); margin-bottom:2px; }
.dest-btn-city { font-size:9px; color:var(--dim); }
.dest-btn-earn { font-size:9px; color:var(--teal); margin-top:2px; }

/* Flight list */
#bk-flight-list { overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:rgba(200,146,60,0.15) transparent; }
.bk-sort-bar { display:flex; gap:5px; padding:10px 22px 8px; border-bottom:1px solid rgba(200,146,60,0.08); flex-shrink:0; }
.bk-sort-btn { font-size:8px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:3px; border:1px solid rgba(200,146,60,0.18); background:rgba(200,146,60,0.05); color:var(--dim); cursor:pointer; transition:all .13s; }
.bk-sort-btn.active, .bk-sort-btn:hover { background:rgba(200,146,60,0.15); color:var(--amber); border-color:rgba(200,146,60,0.4); }

.flight-row { padding:12px 22px; border-bottom:1px solid rgba(200,146,60,0.07); cursor:pointer; transition:all .13s; display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center; }
.flight-row:hover { background:rgba(200,146,60,0.06); }
.flight-row.selected { background:rgba(200,146,60,0.1); border-left:3px solid var(--amber); }
.fr-airline { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:800; color:var(--amber); letter-spacing:.04em; min-width:28px; }
.fr-info { }
.fr-name { font-size:11px; font-weight:500; color:var(--off-white); margin-bottom:2px; }
.fr-times { font-size:9px; color:var(--dim); }
.fr-times .dep { color:var(--off-white); font-weight:600; }
.fr-aircraft { font-size:8px; color:rgba(200,146,60,0.5); margin-top:1px; }
.fr-fares { text-align:right; }
.fare-opt { display:flex; align-items:center; gap:6px; justify-content:flex-end; margin-bottom:4px; }
.fare-label { font-size:8px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
.fare-price { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; color:var(--teal); }
.fare-price.biz { color:var(--amber); }
.fare-radio { width:12px; height:12px; border-radius:50%; border:1px solid rgba(200,146,60,0.3); flex-shrink:0; }
.fare-radio.sel { background:var(--amber); border-color:var(--amber); }

/* Booking footer */
.bk-footer { padding:12px 22px 18px; border-top:1px solid rgba(200,146,60,0.1); flex-shrink:0; }
.bk-selection-info { font-size:9px; color:var(--dim); margin-bottom:10px; }
.bk-selection-info strong { color:var(--off-white); }
.bk-btn-row { display:flex; gap:8px; }
.bk-btn-cancel { padding:10px 16px; background:transparent; border:1px solid rgba(200,146,60,0.18); color:var(--dim); border-radius:6px; cursor:pointer; font-size:11px; transition:all .14s; }
.bk-btn-cancel:hover { border-color:rgba(200,146,60,0.4); color:var(--off-white); }
.bk-btn-book { flex:1; padding:12px 16px; background:rgba(200,146,60,0.16); border:1px solid rgba(200,146,60,0.5); color:var(--amber); border-radius:6px; cursor:pointer; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:800; letter-spacing:.08em; transition:all .18s; }
.bk-btn-book:hover { background:rgba(200,146,60,0.28); }
.bk-btn-book:disabled { opacity:0.3; cursor:not-allowed; }

/* ── BOARDING PASS ── */
#bp-overlay {
  position:absolute; inset:0; z-index:600;
  background:rgba(4,7,12,0.9); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
#bp-overlay.open { opacity:1; pointer-events:all; }

.boarding-pass {
  width:420px; max-width:94vw;
  background:#F8F6F2; border-radius:12px; overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.9);
  animation:celebIn .35s cubic-bezier(.4,0,.2,1);
  color:#2C2C3E;
}
.bp-header {
  background:#2C2C3E; padding:18px 24px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.bp-logo { font-family:'Montserrat',sans-serif; }
.bp-logo .sky  { font-weight:800; font-size:16px; color:#C8923C; }
.bp-logo .ward { font-weight:200; font-size:16px; color:rgba(248,246,242,0.9); }
.bp-airline-name { font-size:10px; color:rgba(248,246,242,0.4); letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
.bp-class-badge { font-family:'Montserrat',sans-serif; font-size:9px; font-weight:700; letter-spacing:.1em; padding:4px 10px; border-radius:3px; text-transform:uppercase; }
.bp-class-eco { background:rgba(92,138,122,0.25); color:#5C8A7A; border:1px solid rgba(92,138,122,0.4); }
.bp-class-biz { background:rgba(200,146,60,0.2); color:#C8923C; border:1px solid rgba(200,146,60,0.5); }

.bp-route { padding:20px 24px 16px; border-bottom:2px dashed rgba(44,44,62,0.15); }
.bp-cities { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.bp-city-block { }
.bp-city-code { font-family:'Montserrat',sans-serif; font-size:42px; font-weight:800; color:#2C2C3E; line-height:1; }
.bp-city-name { font-size:10px; color:#6A6478; margin-top:3px; }
.bp-city-block.right { text-align:right; }
.bp-plane-line { flex:1; display:flex; align-items:center; gap:6px; padding:0 12px; }
.bp-line { flex:1; height:1px; background:rgba(44,44,62,0.15); }
.bp-plane-icon { font-size:18px; color:#C8923C; }

.bp-fields { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; padding:0 24px 16px; }
.bp-field { padding:8px 0; border-right:1px solid rgba(44,44,62,0.1); padding-right:12px; margin-right:12px; }
.bp-field:last-child { border-right:none; padding-right:0; margin-right:0; }
.bp-field-label { font-size:7px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#A89E94; margin-bottom:3px; }
.bp-field-val { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700; color:#2C2C3E; }

/* Tear line */
.bp-tear { display:flex; align-items:center; gap:0; position:relative; }
.bp-tear-circle { width:20px; height:20px; border-radius:50%; background:#09090f; flex-shrink:0; }
.bp-tear-dots { flex:1; border-top:2px dashed rgba(44,44,62,0.2); }

/* Stub */
.bp-stub { padding:14px 24px 18px; background:#F0EDE8; }
.bp-stub-row { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px; }
.bp-stub-field { }
.bp-stub-label { font-size:7px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#A89E94; margin-bottom:2px; }
.bp-stub-val   { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; color:#2C2C3E; }
.bp-barcode    { display:flex; gap:2px; align-items:flex-end; height:32px; }
.bp-bar { width:2px; border-radius:1px; background:#2C2C3E; }
.bp-board-btn { display:block; width:100%; margin-top:14px; padding:12px; background:#2C2C3E; color:#C8923C; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:800; letter-spacing:.1em; border:none; border-radius:7px; cursor:pointer; transition:all .15s; text-align:center; }
.bp-board-btn:hover { background:#3a3a52; }

/* ── FLIGHT TRACKER ── */
#tracker-bar {
  position:absolute; bottom:0; left:0; right:0; z-index:200;
  height:72px;
  background:rgba(8,13,20,0.96); border-top:1px solid rgba(200,146,60,0.25);
  backdrop-filter:blur(14px);
  display:flex; align-items:center; padding:0 22px; gap:0;
  transform:translateY(100%); transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#tracker-bar.open { transform:translateY(0); }
.trk-section { display:flex; flex-direction:column; gap:2px; }
.trk-label { font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); }
.trk-value { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:800; color:var(--off-white); }
.trk-value.am { color:var(--amber); }
.trk-value.tl { color:var(--teal); }
.trk-sep { width:1px; height:36px; background:rgba(200,146,60,0.15); margin:0 18px; flex-shrink:0; }
.trk-progress-wrap { flex:1; margin:0 20px; }
.trk-route-line { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.trk-route-ap { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:800; color:var(--amber); }
.trk-prog-bar { height:4px; background:rgba(200,146,60,0.12); border-radius:2px; overflow:visible; position:relative; }
.trk-prog-fill { height:100%; background:linear-gradient(90deg,var(--teal),var(--amber)); border-radius:2px; transition:width .5s linear; position:relative; }
.trk-plane-dot { position:absolute; right:-6px; top:-4px; width:12px; height:12px; border-radius:50%; background:var(--amber); border:2px solid #09090f; box-shadow:0 0 8px rgba(200,146,60,0.6); }
.trk-land-btn { padding:8px 16px; background:rgba(200,146,60,0.14); border:1px solid rgba(200,146,60,0.4); color:var(--amber); font-family:'Montserrat',sans-serif; font-size:10px; font-weight:700; letter-spacing:.08em; border-radius:5px; cursor:pointer; transition:all .14s; white-space:nowrap; flex-shrink:0; }
.trk-land-btn:hover { background:rgba(200,146,60,0.26); }

/* ══════════════════════════════════════════════════════
   PHASE 6 — CEO DASHBOARD & ECONOMY
   ══════════════════════════════════════════════════════ */

/* CEO button in HUD */
#ceo-hud-btn {
  display:flex; align-items:center; gap:7px;
  padding:5px 12px; margin-left:12px;
  background:rgba(200,146,60,0.08); border:1px solid rgba(200,146,60,0.22);
  border-radius:5px; cursor:pointer; transition:all .15s; flex-shrink:0;
}
#ceo-hud-btn:hover { background:rgba(200,146,60,0.18); border-color:rgba(200,146,60,0.45); }
.ceo-hud-label { font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); }
.ceo-hud-sal   { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:800; color:var(--amber); }

/* CEO Dashboard panel (slides in from left) */
#ceo-panel {
  position:absolute; top:52px; left:0; bottom:0; width:380px;
  background:rgba(8,11,18,0.97); border-right:1px solid rgba(200,146,60,0.2);
  z-index:300; display:flex; flex-direction:column;
  transform:translateX(-100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(14px);
}
#ceo-panel.open { transform:translateX(0); }

.ceo-panel-header {
  padding:18px 20px 14px; border-bottom:1px solid rgba(200,146,60,0.12);
  display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0;
}
.ceo-panel-eyebrow { font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--amber); margin-bottom:4px; }
.ceo-panel-title   { font-family:'Montserrat',sans-serif; font-size:18px; font-weight:800; color:var(--off-white); }
.ceo-panel-sub     { font-size:10px; color:var(--dim); margin-top:2px; }
.ceo-panel-close   { width:28px; height:28px; background:rgba(200,146,60,0.07); border:1px solid rgba(200,146,60,0.2); border-radius:5px; color:var(--amber); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.ceo-panel-close:hover { background:rgba(200,146,60,0.18); }

.ceo-body { flex:1; overflow-y:auto; padding:0; scrollbar-width:thin; scrollbar-color:rgba(200,146,60,0.15) transparent; }
.ceo-body::-webkit-scrollbar { width:3px; }
.ceo-body::-webkit-scrollbar-thumb { background:rgba(200,146,60,0.18); border-radius:2px; }

/* Salary hero */
.ceo-salary-hero {
  padding:18px 20px; background:rgba(200,146,60,0.05);
  border-bottom:1px solid rgba(200,146,60,0.1);
}
.ceo-salary-stage { font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); margin-bottom:4px; }
.ceo-salary-amount { font-family:'Montserrat',sans-serif; font-size:36px; font-weight:800; color:var(--amber); line-height:1; }
.ceo-salary-unit { font-size:11px; color:var(--dim); margin-top:2px; }
.ceo-salary-label { font-size:10px; color:var(--dim); margin-top:1px; }

/* Milestone ladder */
.ceo-section { padding:14px 20px; border-bottom:1px solid rgba(200,146,60,0.08); }
.ceo-sec-head { font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }

.milestone-row {
  display:flex; align-items:center; gap:10px; margin-bottom:7px;
  padding:8px 10px; border-radius:5px;
}
.milestone-row.done    { background:rgba(92,138,122,0.07); }
.milestone-row.current { background:rgba(200,146,60,0.1); border:1px solid rgba(200,146,60,0.25); }
.milestone-row.future  { opacity:0.45; }
.ms-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.ms-dot.done    { background:var(--teal); }
.ms-dot.current { background:var(--amber); box-shadow:0 0 8px rgba(200,146,60,0.5); }
.ms-dot.future  { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); }
.ms-body { flex:1; }
.ms-stage  { font-size:10px; font-weight:600; color:var(--off-white); }
.ms-routes { font-size:8px; color:var(--dim); margin-top:1px; }
.ms-sal    { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:800; color:var(--teal); }
.ms-sal.current { color:var(--amber); }

/* Progress to next */
.ceo-next-wrap { margin-top:10px; }
.ceo-next-label { display:flex; justify-content:space-between; font-size:9px; color:var(--dim); margin-bottom:5px; }
.ceo-next-bar { height:4px; background:rgba(200,146,60,0.1); border-radius:2px; overflow:hidden; }
.ceo-next-fill { height:100%; background:linear-gradient(90deg,var(--teal),var(--amber)); border-radius:2px; transition:width .5s; }

/* Financial stats */
.fin-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(200,146,60,0.08); border:1px solid rgba(200,146,60,0.12); border-radius:6px; overflow:hidden; margin-bottom:10px; }
.fin-cell { background:#08090f; padding:10px 12px; }
.fin-k { font-size:8px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
.fin-v { font-family:'Montserrat',sans-serif; font-size:14px; font-weight:800; }
.fin-v.am { color:var(--amber); }
.fin-v.tl { color:var(--teal); }
.fin-v.wh { color:var(--off-white); }

/* Earnings history mini-chart */
.earn-chart { height:60px; display:flex; align-items:flex-end; gap:2px; margin-top:8px; }
.earn-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
.earn-bar { width:100%; border-radius:2px 2px 0 0; background:rgba(92,138,122,0.5); min-height:2px; transition:height .4s; }
.earn-bar.today { background:var(--amber); }
.earn-day { font-size:7px; color:var(--dim); }

/* Bonus log */
.bonus-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(200,146,60,0.07); }
.bonus-row:last-child { border-bottom:none; }
.bonus-icon { font-size:14px; flex-shrink:0; }
.bonus-info { flex:1; }
.bonus-name { font-size:10px; color:var(--off-white); }
.bonus-day  { font-size:8px; color:var(--dim); }
.bonus-amt  { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700; color:var(--teal); }

/* Promotion modal */
#promo-overlay {
  position:absolute; inset:0; z-index:700;
  background:rgba(4,7,12,0.88); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
#promo-overlay.open { opacity:1; pointer-events:all; }
#promo-modal {
  width:420px; max-width:94vw;
  background:#08090f; border:1px solid rgba(200,146,60,0.4);
  border-radius:14px; overflow:hidden;
  transform:translateY(16px) scale(0.97);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 40px 100px rgba(0,0,0,0.85), 0 0 60px rgba(200,146,60,0.08);
}
#promo-overlay.open #promo-modal { transform:none; }

.promo-glow { height:3px; background:linear-gradient(90deg,transparent,var(--amber),transparent); }
.promo-body { padding:28px 30px 24px; }
.promo-eyebrow { font-size:8px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--amber); margin-bottom:8px; }
.promo-salary { font-family:'Montserrat',sans-serif; font-size:40px; font-weight:800; color:var(--amber); line-height:1; margin-bottom:4px; }
.promo-per-day { font-size:11px; color:var(--dim); margin-bottom:16px; }
.promo-stage { font-family:'Montserrat',sans-serif; font-size:16px; font-weight:700; color:var(--off-white); margin-bottom:14px; }
.promo-message { font-size:12px; color:var(--dim); line-height:1.75; margin-bottom:20px; }
.promo-message strong { color:var(--off-white); }
.promo-sub { font-size:9px; color:rgba(200,146,60,0.5); letter-spacing:.06em; text-transform:uppercase; margin-bottom:20px; }
.promo-dismiss { display:block; width:100%; padding:12px; background:rgba(200,146,60,0.14); border:1px solid rgba(200,146,60,0.4); color:var(--amber); font-family:'Montserrat',sans-serif; font-size:12px; font-weight:800; letter-spacing:.1em; border-radius:7px; cursor:pointer; transition:all .15s; text-align:center; }
.promo-dismiss:hover { background:rgba(200,146,60,0.26); }

/* Day tick notification */
.day-tick-toast {
  position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
  background:rgba(8,13,20,0.95); border:1px solid rgba(200,146,60,0.25);
  border-radius:6px; padding:8px 16px;
  font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700;
  color:var(--teal); letter-spacing:.04em;
  animation:toastIn .3s ease, toastOut .3s ease 2.5s forwards;
  pointer-events:none; z-index:150; white-space:nowrap;
}

/* ══════════════════════════════════════════════════════
   PHASE 7 — SCREEN 2: TRAVELER & ACHIEVEMENTS
   ══════════════════════════════════════════════════════ */

/* Screen 2 container — slides in over screen 1 */
#screen2 {
  position:absolute; inset:0; z-index:400;
  background:#07090e;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column; overflow:hidden;
}
#screen2.open { transform:translateX(0); }

/* Screen 2 top nav */
.s2-nav {
  height:52px; background:#09090f; border-bottom:1px solid rgba(200,146,60,0.18);
  display:flex; align-items:center; padding:0 20px; gap:16px; flex-shrink:0;
}
.s2-nav-back { display:flex; align-items:center; gap:7px; padding:5px 12px; background:rgba(200,146,60,0.07); border:1px solid rgba(200,146,60,0.2); border-radius:5px; cursor:pointer; transition:all .14s; color:var(--amber); font-size:11px; font-weight:600; }
.s2-nav-back:hover { background:rgba(200,146,60,0.16); }
.s2-nav-title { font-family:'Montserrat',sans-serif; font-size:14px; font-weight:800; color:var(--off-white); }
.s2-nav-tabs  { display:flex; gap:4px; margin-left:auto; }
.s2-tab { padding:5px 14px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; transition:all .13s; border:1px solid transparent; color:var(--dim); }
.s2-tab.active { background:rgba(200,146,60,0.12); border-color:rgba(200,146,60,0.3); color:var(--amber); }
.s2-tab:hover:not(.active) { color:var(--off-white); }

/* Screen 2 body */
.s2-body { flex:1; overflow-y:auto; padding:20px; scrollbar-width:thin; scrollbar-color:rgba(200,146,60,0.15) transparent; }
.s2-body::-webkit-scrollbar { width:4px; }
.s2-body::-webkit-scrollbar-thumb { background:rgba(200,146,60,0.18); border-radius:2px; }

.s2-section { margin-bottom:28px; }
.s2-sec-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.s2-sec-title { font-family:'Montserrat',sans-serif; font-size:14px; font-weight:800; color:var(--off-white); }
.s2-sec-count { font-size:9px; font-weight:700; background:rgba(200,146,60,0.14); color:var(--amber); border-radius:10px; padding:2px 7px; font-family:'Montserrat',sans-serif; }
.s2-sec-line  { flex:1; height:1px; background:rgba(200,146,60,0.1); }

/* Flight log table */
.flight-log-table { width:100%; border-collapse:collapse; }
.flight-log-table th { font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); padding:6px 10px; text-align:left; border-bottom:1px solid rgba(200,146,60,0.1); }
.flight-log-table td { padding:8px 10px; border-bottom:1px solid rgba(200,146,60,0.06); font-size:10px; color:var(--off-white); }
.flight-log-table tr:hover td { background:rgba(200,146,60,0.04); }
.fl-route { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:800; color:var(--amber); }
.fl-airline { font-size:9px; color:var(--dim); margin-top:1px; }
.fl-class-eco { color:var(--teal); }
.fl-class-biz { color:var(--amber); }
.fl-no-flights { text-align:center; padding:30px; color:var(--dim); font-size:11px; }

/* Flight log totals */
.fl-totals { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:rgba(200,146,60,0.08); border:1px solid rgba(200,146,60,0.12); border-radius:7px; overflow:hidden; margin-bottom:14px; }
.fl-total-cell { background:#09090f; padding:10px 12px; text-align:center; }
.fl-total-k { font-size:7px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
.fl-total-v { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:800; }
.fl-total-v.am { color:var(--amber); }
.fl-total-v.tl { color:var(--teal); }
.fl-total-v.wh { color:var(--off-white); }

/* Achievement cards — money rewards */
.ach-money-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.ach-money-card {
  background:rgba(200,146,60,0.04); border:1px solid rgba(200,146,60,0.14);
  border-radius:8px; padding:12px 14px; transition:all .15s;
}
.ach-money-card.unlocked { background:rgba(92,138,122,0.08); border-color:rgba(92,138,122,0.3); }
.ach-money-card.unlocked .acm-title { color:#4caf7d; }
.acm-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.acm-title  { font-size:11px; font-weight:600; color:var(--off-white); flex:1; }
.acm-reward { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:800; color:var(--teal); flex-shrink:0; margin-left:8px; }
.acm-trigger { font-size:9px; color:var(--dim); line-height:1.4; margin-bottom:6px; }
.acm-progress-bar { height:3px; background:rgba(200,146,60,0.1); border-radius:2px; overflow:hidden; }
.acm-progress-fill { height:100%; border-radius:2px; transition:width .5s; }
.acm-progress-fill.done { background:#4caf7d; }
.acm-progress-fill.prog { background:linear-gradient(90deg,var(--teal),var(--amber)); }
.acm-status { font-size:8px; margin-top:4px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
.acm-status.done { color:#4caf7d; }
.acm-status.prog { color:var(--dim); }

/* Achievement cards — trophy */
.ach-trophy-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.ach-trophy-card {
  background:rgba(200,146,60,0.04); border:1px solid rgba(200,146,60,0.1);
  border-radius:8px; padding:12px; text-align:center; transition:all .15s;
}
.ach-trophy-card.unlocked { background:rgba(200,146,60,0.1); border-color:rgba(200,146,60,0.35); }
.act-icon { font-size:22px; margin-bottom:6px; filter:grayscale(1) opacity(0.35); }
.ach-trophy-card.unlocked .act-icon { filter:none; }
.act-title { font-size:9px; font-weight:700; color:var(--dim); line-height:1.3; }
.ach-trophy-card.unlocked .act-title { color:var(--off-white); }
.act-trigger { font-size:8px; color:rgba(255,255,255,0.2); margin-top:3px; line-height:1.3; }
.ach-trophy-card.unlocked .act-trigger { color:var(--dim); }

/* Achievement unlock notification overlay */
#ach-notify {
  position:absolute; top:66px; right:20px; z-index:650;
  display:flex; flex-direction:column; gap:8px; pointer-events:none;
  width:300px;
}
.ach-notif {
  background:rgba(8,13,20,0.97); border:1px solid rgba(200,146,60,0.45);
  border-radius:8px; padding:12px 14px; display:flex; align-items:center; gap:10px;
  animation:toastIn .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 8px 24px rgba(0,0,0,0.5), 0 0 20px rgba(200,146,60,0.1);
}
.ach-notif-icon { font-size:22px; flex-shrink:0; }
.ach-notif-body {}
.ach-notif-label { font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); margin-bottom:2px; }
.ach-notif-title { font-size:12px; font-weight:700; color:var(--off-white); margin-bottom:2px; }
.ach-notif-reward { font-size:10px; color:var(--teal); font-family:'Montserrat',sans-serif; font-weight:700; }

/* Screen 2 tab panes */
.s2-pane { display:none; }
.s2-pane.active { display:block; }

/* Traveler stats hero */
.traveler-hero { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:rgba(200,146,60,0.08); border:1px solid rgba(200,146,60,0.12); border-radius:8px; overflow:hidden; margin-bottom:20px; }
.th-cell { background:#09090f; padding:14px; text-align:center; }
.th-k { font-size:7px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
.th-v { font-family:'Montserrat',sans-serif; font-size:18px; font-weight:800; color:var(--amber); }

/* Screen nav button in HUD */
#s2-nav-btn {
  display:flex; align-items:center; gap:6px; padding:5px 12px;
  background:rgba(200,146,60,0.06); border:1px solid rgba(200,146,60,0.18);
  border-radius:5px; cursor:pointer; transition:all .14s; flex-shrink:0; margin-left:8px;
}
#s2-nav-btn:hover { background:rgba(200,146,60,0.16); border-color:rgba(200,146,60,0.38); }
.s2-nav-btn-label { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }
.s2-nav-btn-icon { font-size:14px; }

/* ══════════════════════════════════════════════════════
   PHASE 8 — ONBOARDING · TUTORIAL · POLISH
   ══════════════════════════════════════════════════════ */

/* Onboarding screen */
#onboarding {
  position:fixed; inset:0; z-index:1000;
  background:#06080d;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px;
}
.ob-logo { font-family:'Montserrat',sans-serif; margin-bottom:6px; }
.ob-logo .sky  { font-weight:800; font-size:48px; color:#C8923C; letter-spacing:-2px; }
.ob-logo .ward { font-weight:200; font-size:48px; color:rgba(248,246,242,0.9); letter-spacing:-2px; }
.ob-tagline { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:.2em; text-transform:uppercase; margin-bottom:36px; }

.ob-card {
  width:100%; max-width:560px;
  background:#09090f; border:1px solid rgba(200,146,60,0.25);
  border-radius:14px; overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.8);
}
.ob-step { display:none; flex-direction:column; }
.ob-step.active { display:flex; }

.ob-step-header { padding:20px 24px 16px; border-bottom:1px solid rgba(200,146,60,0.1); }
.ob-step-num  { font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--amber); margin-bottom:4px; }
.ob-step-title { font-family:'Montserrat',sans-serif; font-size:18px; font-weight:800; color:var(--off-white); }
.ob-step-sub   { font-size:10px; color:var(--dim); margin-top:3px; }

.ob-step-body  { padding:18px 24px; flex:1; overflow-y:auto; max-height:400px; scrollbar-width:thin; scrollbar-color:rgba(200,146,60,0.15) transparent; }
.ob-step-footer { padding:14px 24px 20px; border-top:1px solid rgba(200,146,60,0.08); display:flex; gap:10px; }

/* Airline selection grid */
.ob-airline-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.ob-airline-card {
  padding:12px 14px; border:1px solid rgba(200,146,60,0.14);
  border-radius:8px; cursor:pointer; transition:all .15s;
  background:rgba(200,146,60,0.04);
}
.ob-airline-card:hover  { background:rgba(200,146,60,0.1); border-color:rgba(200,146,60,0.35); }
.ob-airline-card.selected { background:rgba(200,146,60,0.14); border-color:var(--amber); }
.ob-al-code   { font-family:'Montserrat',sans-serif; font-size:20px; font-weight:800; color:var(--amber); margin-bottom:2px; }
.ob-al-name   { font-size:10px; color:var(--off-white); margin-bottom:3px; }
.ob-al-hub    { font-size:9px; color:var(--dim); }
.ob-al-routes { font-size:9px; color:var(--teal); margin-top:2px; }
.ob-alliance-badge { display:inline-block; font-size:7px; font-weight:700; letter-spacing:.08em; padding:2px 6px; border-radius:3px; margin-top:3px; border:1px solid; }

/* Budget cards */
.ob-budget-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.ob-budget-card {
  padding:14px 12px; border:1px solid rgba(200,146,60,0.14);
  border-radius:8px; cursor:pointer; transition:all .15s; text-align:center;
  background:rgba(200,146,60,0.04);
}
.ob-budget-card:hover   { background:rgba(200,146,60,0.1); border-color:rgba(200,146,60,0.35); }
.ob-budget-card.selected { background:rgba(200,146,60,0.14); border-color:var(--amber); }
.ob-bud-amount { font-family:'Montserrat',sans-serif; font-size:22px; font-weight:800; color:var(--amber); margin-bottom:4px; }
.ob-bud-label  { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--off-white); margin-bottom:4px; }
.ob-bud-desc   { font-size:9px; color:var(--dim); line-height:1.4; }

/* Summary step */
.ob-summary { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(200,146,60,0.08); border:1px solid rgba(200,146,60,0.14); border-radius:8px; overflow:hidden; }
.ob-sum-cell { background:#09090f; padding:10px 14px; }
.ob-sum-k { font-size:8px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
.ob-sum-v { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:800; color:var(--off-white); }
.ob-sum-v.am { color:var(--amber); }

/* Onboarding buttons */
.ob-btn-primary { flex:1; padding:12px 18px; background:rgba(200,146,60,0.16); border:1px solid rgba(200,146,60,0.5); color:var(--amber); font-family:'Montserrat',sans-serif; font-size:12px; font-weight:800; letter-spacing:.08em; border-radius:7px; cursor:pointer; transition:all .18s; }
.ob-btn-primary:hover { background:rgba(200,146,60,0.28); }
.ob-btn-primary:disabled { opacity:0.3; cursor:not-allowed; }
.ob-btn-back { padding:12px 16px; background:transparent; border:1px solid rgba(200,146,60,0.18); color:var(--dim); border-radius:7px; cursor:pointer; font-size:11px; transition:all .14s; }
.ob-btn-back:hover { border-color:rgba(200,146,60,0.38); color:var(--off-white); }

/* Onboarding progress dots */
.ob-dots { display:flex; gap:6px; justify-content:center; margin-top:16px; }
.ob-dot  { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.12); transition:all .2s; }
.ob-dot.active { background:var(--amber); width:18px; border-radius:3px; }

/* Tutorial overlay */
#tutorial {
  position:absolute; inset:0; z-index:350;
  pointer-events:none;
}
.tut-step {
  position:absolute; pointer-events:all;
  background:rgba(8,11,18,0.97); border:1px solid rgba(200,146,60,0.4);
  border-radius:10px; padding:14px 18px; width:260px;
  box-shadow:0 12px 40px rgba(0,0,0,0.7);
  animation:toastIn .3s cubic-bezier(.4,0,.2,1);
}
.tut-step-num   { font-size:8px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--amber); margin-bottom:4px; }
.tut-step-title { font-size:13px; font-weight:700; color:var(--off-white); margin-bottom:5px; }
.tut-step-body  { font-size:10px; color:var(--dim); line-height:1.6; margin-bottom:12px; }
.tut-step-arrow { font-size:20px; position:absolute; }
.tut-btn-row { display:flex; gap:7px; }
.tut-btn-next { flex:1; padding:8px 12px; background:rgba(200,146,60,0.14); border:1px solid rgba(200,146,60,0.4); color:var(--amber); font-family:'Montserrat',sans-serif; font-size:10px; font-weight:700; letter-spacing:.08em; border-radius:5px; cursor:pointer; transition:all .14s; }
.tut-btn-next:hover { background:rgba(200,146,60,0.26); }
.tut-btn-skip { padding:8px 10px; background:transparent; border:1px solid rgba(255,255,255,0.08); color:var(--dim); border-radius:5px; cursor:pointer; font-size:10px; transition:all .13s; }
.tut-btn-skip:hover { color:var(--off-white); }

/* Spotlight highlight ring */
.tut-spotlight {
  position:absolute; border-radius:50%;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.55), 0 0 0 2px rgba(200,146,60,0.6);
  pointer-events:none; transition:all .4s cubic-bezier(.4,0,.2,1);
}

/* Save indicator */
#save-indicator {
  position:absolute; bottom:8px; right:8px; z-index:100;
  font-size:9px; color:rgba(200,146,60,0.4); letter-spacing:.08em;
  pointer-events:none; transition:opacity .3s;
}

/* Resume banner (shown if saved game exists) */
#resume-banner {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  z-index:1001; display:none;
  background:rgba(8,11,18,0.97); border:1px solid rgba(92,138,122,0.45);
  border-radius:9px; padding:12px 20px;
  display:flex; align-items:center; gap:14px;
  box-shadow:0 12px 40px rgba(0,0,0,0.7);
}
.rb-text  { font-size:11px; color:var(--off-white); }
.rb-text strong { color:var(--teal); font-family:'Montserrat',sans-serif; }
.rb-resume { padding:8px 16px; background:rgba(92,138,122,0.16); border:1px solid rgba(92,138,122,0.45); color:var(--teal); font-family:'Montserrat',sans-serif; font-size:10px; font-weight:700; letter-spacing:.08em; border-radius:5px; cursor:pointer; transition:all .14s; }
.rb-resume:hover { background:rgba(92,138,122,0.3); }
.rb-new { padding:8px 14px; background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--dim); font-size:10px; border-radius:5px; cursor:pointer; transition:all .13s; }
.rb-new:hover { color:var(--off-white); }

<body>

<!-- ══ ONBOARDING ══ -->
<div id="onboarding">
  <div class="ob-logo"><span class="sky">SKY</span><span class="ward">WARD</span></div>
  <div class="ob-tagline">Build your airline empire</div>

  <div class="ob-card">

    <!-- Step 1: Choose airline -->
    <div class="ob-step active" id="ob-step-1">
      <div class="ob-step-header">
        <div class="ob-step-num">Step 1 of 3</div>
        <div class="ob-step-title">Choose your starting airline</div>
        <div class="ob-step-sub">You'll acquire more airlines as your empire grows.</div>
      </div>
      <div class="ob-step-body">
        <div class="ob-airline-grid" id="ob-airline-grid">
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="ob-step-footer">
        <button class="ob-btn-primary" id="ob-al-next" disabled onclick="obStep(2)">Choose Airline →</button>
      </div>
    </div>

    <!-- Step 2: Choose budget -->
    <div class="ob-step" id="ob-step-2">
      <div class="ob-step-header">
        <div class="ob-step-num">Step 2 of 3</div>
        <div class="ob-step-title">Starting budget</div>
        <div class="ob-step-sub">This is your airline's initial capital. Choose your challenge level.</div>
      </div>
      <div class="ob-step-body">
        <div class="ob-budget-grid">
          <div class="ob-budget-card" data-budget="30000" onclick="selectBudget(this)">
            <div class="ob-bud-amount">$30K</div>
            <div class="ob-bud-label">Lean Start</div>
            <div class="ob-bud-desc">Every route matters. No room for mistakes.</div>
          </div>
          <div class="ob-budget-card selected" data-budget="75000" onclick="selectBudget(this)">
            <div class="ob-bud-amount">$75K</div>
            <div class="ob-bud-label">Standard</div>
            <div class="ob-bud-desc">The recommended experience.</div>
          </div>
          <div class="ob-budget-card" data-budget="150000" onclick="selectBudget(this)">
            <div class="ob-bud-amount">$150K</div>
            <div class="ob-bud-label">Head Start</div>
            <div class="ob-bud-desc">More breathing room to explore.</div>
          </div>
        </div>
      </div>
      <div class="ob-step-footer">
        <button class="ob-btn-back" onclick="obStep(1)">← Back</button>
        <button class="ob-btn-primary" onclick="obStep(3)">Confirm Budget →</button>
      </div>
    </div>

    <!-- Step 3: Summary & launch -->
    <div class="ob-step" id="ob-step-3">
      <div class="ob-step-header">
        <div class="ob-step-num">Step 3 of 3</div>
        <div class="ob-step-title">Ready for takeoff</div>
        <div class="ob-step-sub">Your empire begins at Day 1. Unlock routes from your hub.</div>
      </div>
      <div class="ob-step-body">
        <div class="ob-summary" id="ob-summary"></div>
        <div style="margin-top:14px;padding:12px 14px;background:rgba(200,146,60,0.06);border:1px solid rgba(200,146,60,0.15);border-radius:7px;font-size:10px;color:var(--dim);line-height:1.7">
          <strong style="color:var(--off-white)">How to play:</strong> You start at your hub airport. Click airports on the map to unlock routes, book personal flights, and acquire rival airlines. Your balance grows every game day from active routes.
        </div>
      </div>
      <div class="ob-step-footer">
        <button class="ob-btn-back" onclick="obStep(2)">← Back</button>
        <button class="ob-btn-primary" id="ob-launch-btn" onclick="launchGame()">Launch My Airline ✈</button>
      </div>
    </div>
  </div>

  <div class="ob-dots">
    <div class="ob-dot active" id="ob-dot-1"></div>
    <div class="ob-dot" id="ob-dot-2"></div>
    <div class="ob-dot" id="ob-dot-3"></div>
  </div>

  <!-- Resume banner (if save exists) -->
  <div id="resume-banner" style="display:none">
    <div class="rb-text">Saved game found — <strong id="rb-info">Day 1</strong></div>
    <button class="rb-resume" onclick="resumeGame()">Resume</button>
    <button class="rb-new" onclick="document.getElementById('resume-banner').style.display='none'">New game</button>
  </div>
</div>

<!-- Tutorial overlay -->
<div id="tutorial"></div>

<!-- Save indicator -->
<div id="save-indicator">● Auto-saved</div>

<div id="loading">
  <div class="ld-logo"><span class="sky">SKY</span><span class="ward">WARD</span></div>
  <div class="ld-msg" id="ld-msg">Loading route network…</div>
  <div class="ld-bar-o"><div class="ld-bar-i" id="ld-bar"></div></div>
</div>

<canvas id="map-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-logo"><span class="sky">SKY</span><span class="ward">WARD</span></div>
  <div class="hud-sep"></div>
  <div class="hud-block">
    <div class="hud-label">Airline</div>
    <div class="hud-value sm" id="hud-airline">—</div>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-block">
    <div class="hud-label">Location</div>
    <div class="hud-value w" id="hud-loc">—</div>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-block">
    <div class="hud-label">Balance</div>
    <div class="hud-value" id="hud-bal">—</div>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-block">
    <div class="hud-label">Day</div>
    <div class="hud-value w" id="hud-day">1</div>
    <div class="day-bar-wrap"><div class="day-bar-fill" id="hud-daybar"></div></div>
  </div>
  <div class="hud-sep"></div>
  <div class="hud-block">
    <div class="hud-label">Routes</div>
    <div class="hud-value t" id="hud-routes">0</div>
  </div>
  <div id="hud-spacer"></div>
  <div id="s2-nav-btn" onclick="openScreen2()">
    <div class="s2-nav-btn-icon">🏆</div>
    <div class="s2-nav-btn-label">Traveler</div>
  </div>
  <div id="ceo-hud-btn" onclick="toggleCeoPanel()">
    <div>
      <div class="ceo-hud-label">CEO Salary</div>
      <div class="ceo-hud-sal" id="hud-ceo-sal">$200/day</div>
    </div>
  </div>
  <span class="hud-label" style="align-self:center;margin-right:6px;margin-left:12px">Speed</span>
  <div class="speed-controls">
    <button class="spd-btn active" data-s="1">1×</button>
    <button class="spd-btn" data-s="4">4×</button>
    <button class="spd-btn" data-s="16">16×</button>
    <button class="spd-btn" data-s="60">60×</button>
