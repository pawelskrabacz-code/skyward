<script>
'use strict';

// ══════════════════════════════════════════════════════
//  DEMO STATE
// ══════════════════════════════════════════════════════
const DEMO_ROUTE_SETS = {
  AA: ['DFW','LAX','ORD','MIA','JFK','LHR','CDG','NRT','SYD','JFK','LAX','LHR','ORD','GRU','BOG','MEX','GDL','CUN','HNL','FRA'],
};
const DEMO = {
  airlineCode: '',
  airlineName: '',
  hub: '',
  playerLocation: '',
  balance: 0,
  day: 1,
  unlockedRoutes: new Set(),
};

function isRouteUnlocked(a, b) {
  return DEMO.unlockedRoutes.has(`${a}|${b}`) || DEMO.unlockedRoutes.has(`${b}|${a}`);
}

function getNetworkAirports() {
  const s = new Set();
  for (const r of DEMO.unlockedRoutes) {
    const [a, b] = r.split('|');
    s.add(a); s.add(b);
  }
  return s;
}

// ══════════════════════════════════════════════════════
//  MAP ENGINE
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx    = canvas.getContext('2d');
let W, H, offsetX=0, offsetY=0, scale=1;
const MIN_SCALE=0.4, MAX_SCALE=14;
let staticDirty = true;
const sCanvas = document.createElement('canvas');
const sCtx    = sCanvas.getContext('2d');
let apPos = {}; // iata -> {x,y} world [0,1]

// Simplified land polygons
const LAND_POLYS=[
[[-168,71],[-141,72],[-90,74],[-68,63],[-65,50],[-55,47],[-64,44],[-70,42],[-74,41],[-76,35],[-81,25],[-84,30],[-90,29],[-97,26],[-97,22],[-110,24],[-117,32],[-118,34],[-122,38],[-124,46],[-124,49],[-130,54],[-141,60]],
[[-90,16],[-83,10],[-78,8],[-80,9],[-84,10],[-90,16]],
[[-44,83],[-68,78],[-65,60],[-22,70],[-18,77]],
[[-85,22],[-74,20],[-73,18],[-77,18],[-80,22],[-85,22]],
[[-80,8],[-63,10],[-52,4],[-35,-5],[-35,-12],[-39,-15],[-43,-23],[-49,-28],[-52,-34],[-57,-38],[-65,-56],[-73,-50],[-71,-30],[-70,-18],[-80,-2]],
[[-9,36],[-9,44],[-8,52],[-6,58],[0,58],[0,51],[3,51],[5,54],[9,54],[10,57],[5,62],[8,63],[14,68],[20,70],[28,72],[30,68],[22,60],[26,58],[28,54],[20,50],[18,50],[24,48],[30,46],[28,41],[24,38],[20,38],[14,40],[7,44],[0,43],[-2,44],[-9,44]],
[[-6,50],[-2,50],[2,51],[0,56],[-4,58],[-6,58],[-8,54],[-5,52]],
[[-24,64],[-14,64],[-14,66],[-22,68],[-26,66],[-24,64]],
[[-5,36],[0,37],[4,37],[14,30],[32,30],[44,12],[34,5],[34,0],[36,-5],[40,-10],[35,-18],[28,-35],[18,-34],[10,-15],[8,-5],[0,6],[-5,5],[-16,12],[-17,18],[-8,23],[-5,28],[-5,32],[-3,34]],
[[44,-12],[50,-16],[50,-24],[46,-26],[44,-24],[44,-18]],
[[36,30],[44,28],[52,24],[58,16],[56,12],[50,12],[44,12],[36,22],[32,22]],
[[26,36],[28,38],[28,42],[36,42],[42,40],[44,38],[36,36],[26,36]],
[[44,38],[60,38],[72,38],[80,36],[80,30],[80,26],[74,22],[78,8],[76,8],[68,8],[60,22],[52,24],[52,36],[44,38]],
[[28,68],[44,72],[60,76],[80,76],[100,74],[120,72],[140,74],[180,72],[180,68],[160,60],[140,60],[120,62],[100,62],[80,60],[60,54],[44,60],[28,68]],
[[60,54],[80,60],[100,62],[120,62],[120,50],[110,44],[100,42],[100,22],[96,16],[90,26],[84,26],[80,30],[80,34],[80,36],[80,38],[80,40],[100,42]],
[[100,22],[104,2],[108,2],[110,6],[116,8],[120,14],[124,20],[126,22],[128,26],[130,32],[132,34],[134,34],[136,36],[140,36],[142,40],[140,46],[132,48],[132,56],[142,54],[148,46],[152,48],[158,52],[162,60],[170,66],[180,68],[160,60],[140,60],[120,62],[110,44],[100,42],[100,22]],
[[96,22],[100,14],[100,6],[104,2],[104,0],[100,2],[96,16]],
[[96,6],[104,0],[108,-4],[106,-4],[102,-2],[96,4]],
[[106,-6],[108,-6],[114,-8],[112,-8],[108,-8],[106,-6]],
[[108,0],[116,2],[118,6],[118,8],[114,4],[108,2],[108,0]],
[[120,0],[122,2],[124,-2],[122,-2],[120,0]],
[[132,-2],[140,-4],[148,-6],[148,-8],[140,-8],[132,-4],[132,-2]],
[[114,-22],[114,-34],[118,-36],[124,-34],[130,-32],[136,-36],[142,-38],[148,-38],[152,-30],[154,-26],[148,-20],[144,-14],[136,-12],[130,-12],[124,-16],[118,-20]],
[[174,-36],[178,-38],[178,-40],[174,-42],[172,-40],[172,-38]],
[[168,-44],[172,-44],[174,-46],[172,-48],[168,-46],[166,-44]],
[[130,34],[134,32],[136,34],[138,36],[140,38],[142,40],[140,42],[136,42],[132,36],[130,34]],
[[140,44],[144,44],[144,42],[140,42],[140,44]],
[[118,10],[120,16],[122,18],[120,18],[118,16],[116,10]],
[[120,22],[122,24],[122,26],[120,26],[120,22]],
[[80,6],[82,8],[82,10],[80,10],[80,6]],
];

function proj(lng, lat) {
  const x = (lng+180)/360;
  const y = 0.5 - Math.log(Math.tan(Math.PI/4 + lat*Math.PI/360)) / (2*Math.PI);
  return {x, y};
}
function w2s(wx, wy) { return { sx: wx*W*scale+offsetX, sy: wy*H*scale+offsetY }; }
function s2w(sx, sy) { return { wx:(sx-offsetX)/(W*scale), wy:(sy-offsetY)/(H*scale) }; }

function resize() {
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  sCanvas.width=W; sCanvas.height=H;
  const arcCanvas=document.getElementById('arc-canvas');
  arcCanvas.width=W; arcCanvas.height=H;
  offsetX=W/2-W*scale/2; offsetY=H/2-H*scale/2+26;
  staticDirty=true;
}

function precompPos() {
  apPos={};
  for (const [iata,ap] of Object.entries(AIRPORTS)) {
    apPos[iata] = proj(ap.lng, ap.lat);
  }
}

function drawGrat(c) {
  c.strokeStyle='rgba(255,255,255,0.022)'; c.lineWidth=0.5/scale;
  for (let lng=-180;lng<=180;lng+=30) {
    c.beginPath();
    for (let lat=-85;lat<=85;lat+=5) {
      const p=proj(lng,lat); const s=w2s(p.x,p.y);
      lat===-85?c.moveTo(s.sx,s.sy):c.lineTo(s.sx,s.sy);
    }
    c.stroke();
  }
  for (let lat=-60;lat<=60;lat+=30) {
    const s0=w2s(proj(-180,lat).x,proj(-180,lat).y), s1=w2s(proj(180,lat).x,proj(180,lat).y);
    c.beginPath(); c.moveTo(s0.sx,s0.sy); c.lineTo(s1.sx,s1.sy); c.stroke();
  }
  c.strokeStyle='rgba(255,255,255,0.05)';
  const se0=w2s(proj(-180,0).x,proj(-180,0).y), se1=w2s(proj(180,0).x,proj(180,0).y);
  c.beginPath(); c.moveTo(se0.sx,se0.sy); c.lineTo(se1.sx,se1.sy); c.stroke();
}

function drawLand(c) {
  c.fillStyle='#141824'; c.strokeStyle='#1e2438'; c.lineWidth=0.6/scale;
  for (const poly of LAND_POLYS) {
    c.beginPath(); let f=true;
    for (const [lng,lat] of poly) {
      const {sx,sy}=w2s(proj(lng,lat).x,proj(lng,lat).y);
      f?c.moveTo(sx,sy):c.lineTo(sx,sy); f=false;
    }
    c.closePath(); c.fill(); c.stroke();
  }
}

function drawAirports(c) {
  const net = getNetworkAirports();
  const list = Object.values(AIRPORTS).sort((a,b)=>(a.routeCount||0)-(b.routeCount||0));
  for (const ap of list) {
    const pos=apPos[ap.iata]; if(!pos) continue;
    const {sx,sy}=w2s(pos.x,pos.y);
    if(sx<-20||sx>W+20||sy<-20||sy>H+20) continue;
    if(ap.iata===DEMO.playerLocation) continue;
    const rc=ap.routeCount||0, onNet=net.has(ap.iata);
    if (rc>=50) {
      if(onNet){
        const g=c.createRadialGradient(sx,sy,0,sx,sy,9);
        g.addColorStop(0,'rgba(200,146,60,0.28)'); g.addColorStop(1,'rgba(200,146,60,0)');
        c.beginPath(); c.arc(sx,sy,9,0,Math.PI*2); c.fillStyle=g; c.fill();
      }
      c.beginPath(); c.arc(sx,sy,onNet?5.5:4.5,0,Math.PI*2);
      c.fillStyle=onNet?'rgba(200,146,60,0.95)':'rgba(200,146,60,0.55)'; c.fill();
    } else if(rc>=10) {
      c.beginPath(); c.arc(sx,sy,onNet?3.5:2.5,0,Math.PI*2);
      c.fillStyle=onNet?'rgba(200,146,60,0.75)':'rgba(200,146,60,0.28)'; c.fill();
    } else {
      if(scale<1.5) continue;
      c.beginPath(); c.arc(sx,sy,1.5,0,Math.PI*2);
      c.fillStyle='rgba(200,146,60,0.16)'; c.fill();
    }
  }
}

function gcPts(lat1,lng1,lat2,lng2,steps=80) {
  const R=d=>d*Math.PI/180, D=r=>r*180/Math.PI;
  const φ1=R(lat1),λ1=R(lng1),φ2=R(lat2),λ2=R(lng2);
  let dλ=λ2-λ1;
  if(dλ>Math.PI) dλ-=2*Math.PI;
  if(dλ<-Math.PI) dλ+=2*Math.PI;
  const pts=[];
  for(let i=0;i<=steps;i++){
    const t=i/steps,A=Math.sin((1-t)*Math.PI)/Math.sin(Math.PI),B=Math.sin(t*Math.PI)/Math.sin(Math.PI);
    const x=A*Math.cos(φ1)*Math.cos(λ1)+B*Math.cos(φ2)*Math.cos(λ1+dλ);
    const y=A*Math.cos(φ1)*Math.sin(λ1)+B*Math.cos(φ2)*Math.sin(λ1+dλ);
    const z=A*Math.sin(φ1)+B*Math.sin(φ2);
    pts.push([D(Math.atan2(z,Math.sqrt(x*x+y*y))),D(Math.atan2(y,x))]);
  }
  return pts;
}

function drawRoutes(c) {
  c.lineWidth=Math.max(0.8,1.4/scale); c.strokeStyle='rgba(92,138,122,0.52)';
  for (const key of DEMO.unlockedRoutes) {
    const [a,b]=key.split('|');
    const apA=AIRPORTS[a], apB=AIRPORTS[b];
    if(!apA||!apB) continue;
    const pts=gcPts(apA.lat,apA.lng,apB.lat,apB.lng);
    c.beginPath(); let f=true, px=null;
    for(const[lat,lng] of pts){
      const {sx,sy}=w2s(proj(lng,lat).x,proj(lng,lat).y);
      if(f){c.moveTo(sx,sy);f=false;px=sx;continue;}
      if(Math.abs(sx-px)>W*0.4) c.moveTo(sx,sy);
      else c.lineTo(sx,sy);
      px=sx;
    }
    c.stroke();
  }
}

function drawPlayer(c, now) {
  const ap=AIRPORTS[DEMO.playerLocation]; if(!ap) return;
  const pos=apPos[DEMO.playerLocation]; if(!pos) return;
  const {sx,sy}=w2s(pos.x,pos.y);
  const ph=(now%2000)/2000, ph2=((now+700)%2000)/2000;
  for(const [p,a] of [[ph,0.6],[ph2,0.35]]){
    c.beginPath(); c.arc(sx,sy,4+p*14,0,Math.PI*2);
    c.strokeStyle=`rgba(200,146,60,${(1-p)*a})`; c.lineWidth=1.5; c.stroke();
  }
  const g=c.createRadialGradient(sx,sy,0,sx,sy,10);
  g.addColorStop(0,'rgba(200,146,60,0.38)'); g.addColorStop(1,'rgba(200,146,60,0)');
  c.beginPath(); c.arc(sx,sy,10,0,Math.PI*2); c.fillStyle=g; c.fill();
  c.beginPath(); c.arc(sx,sy,5,0,Math.PI*2); c.fillStyle='#C8923C'; c.fill();
  c.beginPath(); c.arc(sx,sy,2.5,0,Math.PI*2); c.fillStyle='#F0C070'; c.fill();
}

function drawLabels(c) {
  if(scale<3) return;
  const net=getNetworkAirports();
  c.font=`${Math.min(11,8*scale/3)}px Montserrat`; c.textBaseline='middle';
  for(const [iata,ap] of Object.entries(AIRPORTS)){
    if(ap.routeCount<10&&!net.has(iata)) continue;
    if(ap.routeCount<50&&scale<5&&!net.has(iata)) continue;
    const pos=apPos[iata]; if(!pos) continue;
    const {sx,sy}=w2s(pos.x,pos.y);
    if(sx<-50||sx>W+50||sy<-20||sy>H+20) continue;
    c.fillStyle=net.has(iata)?'rgba(200,146,60,0.85)':'rgba(248,246,242,0.3)';
    c.fillText(iata,sx+7,sy);
  }
}

function render(now) {
  requestAnimationFrame(render);
  const dayPct=(now%(15*60*1000))/(15*60*1000);
  document.getElementById('hud-daybar').style.width=(dayPct*100)+'%';
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#080D14'; ctx.fillRect(0,0,W,H);
  if(staticDirty){
    sCtx.clearRect(0,0,W,H);
    sCtx.save(); drawGrat(sCtx); drawLand(sCtx); drawAirports(sCtx); sCtx.restore();
    staticDirty=false;
  }
  ctx.drawImage(sCanvas,0,0);
  ctx.save(); drawRoutes(ctx); drawPlayer(ctx,now); drawLabels(ctx); ctx.restore();
}

// ══════════════════════════════════════════════════════
//  INTERACTION
// ══════════════════════════════════════════════════════

// Tooltip
const tooltip=document.getElementById('tooltip');
let hovAp=null;

canvas.addEventListener('mousemove', e=>{
  const mx=e.clientX, my=e.clientY;
  let near=null, minD=14;
  const net=getNetworkAirports();
  for(const [iata,ap] of Object.entries(AIRPORTS)){
    if(ap.routeCount<10&&!net.has(iata)&&scale<2.5) continue;
    const pos=apPos[iata]; if(!pos) continue;
    const {sx,sy}=w2s(pos.x,pos.y);
    const d=Math.hypot(mx-sx,my-sy);
    if(d<minD){minD=d;near=ap;}
  }
  if(near!==hovAp){
    hovAp=near;
    if(near){
      document.getElementById('tt-iata').textContent=near.iata;
      document.getElementById('tt-city').textContent=near.city;
      const tier=near.routeCount>=50?'Major Hub':near.routeCount>=10?'Regional':'Small Airport';
      const status=net.has(near.iata)?'<span class="hl">· ON YOUR NETWORK</span>':
                   near.iata===DEMO.playerLocation?'<span class="hl">· YOUR LOCATION</span>':'';
      document.getElementById('tt-meta').innerHTML=`${tier} · ${near.routeCount} routes ${status}`;
      tooltip.classList.add('vis');
    } else tooltip.classList.remove('vis');
  }
  if(near){
    let tx=mx+14,ty=my-10;
    if(tx+180>W) tx=mx-178;
    if(ty<60) ty=my+14;
    tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
  }
});
canvas.addEventListener('mouseleave',()=>{ tooltip.classList.remove('vis'); hovAp=null; });

// Click → open panel
let clickTimer=null;
canvas.addEventListener('click', e=>{
  if(isDragging) return;
  clearTimeout(clickTimer);
  clickTimer=setTimeout(()=>{
    const mx=e.clientX, my=e.clientY;
    let near=null, minD=18;
    const net=getNetworkAirports();
    for(const [iata,ap] of Object.entries(AIRPORTS)){
      if(ap.routeCount<10&&!net.has(iata)&&scale<2) continue;
      const pos=apPos[iata]; if(!pos) continue;
      const {sx,sy}=w2s(pos.x,pos.y);
      const d=Math.hypot(mx-sx,my-sy);
      if(d<minD){minD=d;near=ap;}
    }
    if(near) openAirportPanel(near.iata);
  }, 120);
});

// Zoom
function zoomAt(cx,cy,f){
  const ns=Math.max(MIN_SCALE,Math.min(MAX_SCALE,scale*f));
  const sf=ns/scale;
  offsetX=cx-sf*(cx-offsetX); offsetY=cy-sf*(cy-offsetY);
  scale=ns; staticDirty=true;
}
canvas.addEventListener('wheel',e=>{
  e.preventDefault(); zoomAt(e.clientX,e.clientY,e.deltaY<0?1.12:1/1.12);
},{passive:false});
document.getElementById('zi').onclick=()=>zoomAt(W/2,H/2,1.4);
document.getElementById('zo').onclick=()=>zoomAt(W/2,H/2,1/1.4);
document.getElementById('zr').onclick=resetView;

// Pan
let isDragging=false,dsx,dsy,dox,doy;
canvas.addEventListener('mousedown',e=>{ isDragging=false; dsx=e.clientX;dsy=e.clientY;dox=offsetX;doy=offsetY; });
window.addEventListener('mousemove',e=>{
  if(e.buttons!==1) return;
  if(Math.hypot(e.clientX-dsx,e.clientY-dsy)>4) isDragging=true;
  if(!isDragging) return;
  offsetX=dox+(e.clientX-dsx); offsetY=doy+(e.clientY-dsy); staticDirty=true;
  canvas.classList.add('dragging');
});
window.addEventListener('mouseup',()=>{ canvas.classList.remove('dragging'); setTimeout(()=>isDragging=false,50); });

function flyTo(iata,targetScale){
  const ap=AIRPORTS[iata]; if(!ap) return;
  const p=proj(ap.lng,ap.lat);
  const ts=Math.max(scale,targetScale||2.8);
  const tx=W/2-p.x*W*ts, ty=H/2-p.y*H*ts+26;
  const sx0=offsetX,sy0=offsetY,ss0=scale,t0=performance.now(),dur=850;
  function go(now){ const t=Math.min(1,(now-t0)/dur),e=1-Math.pow(1-t,3);
    scale=ss0+(ts-ss0)*e; offsetX=sx0+(tx-sx0)*e; offsetY=sy0+(ty-sy0)*e; staticDirty=true;
    if(t<1) requestAnimationFrame(go); }
  requestAnimationFrame(go);
}
function resetView(){
  const ts=1,tx=W/2-W*ts/2,ty=H/2-H*ts/2+26;
  const sx0=offsetX,sy0=offsetY,ss0=scale,t0=performance.now(),dur=700;
  function go(now){ const t=Math.min(1,(now-t0)/dur),e=1-Math.pow(1-t,3);
    scale=ss0+(ts-ss0)*e; offsetX=sx0+(tx-sx0)*e; offsetY=sy0+(ty-sy0)*e; staticDirty=true;
    if(t<1) requestAnimationFrame(go); }
  requestAnimationFrame(go);
}

document.querySelectorAll('.spd-btn[data-s]').forEach(b=>{
  b.addEventListener('click',()=>{ document.querySelectorAll('.spd-btn[data-s]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); });
});
window.addEventListener('keydown',e=>{
  if(e.key==='='||e.key==='+') zoomAt(W/2,H/2,1.3);
  if(e.key==='-'||e.key==='_') zoomAt(W/2,H/2,1/1.3);
  if(e.key==='r'||e.key==='R') resetView();
});

function allianceBadge(a) {
  if(!a||a==='None') return '';
  const cls = a==='Star Alliance'?'badge-star':a==='SkyTeam'?'badge-sky':'badge-one';
  return `<span class="badge ${cls}">${a}</span>`;
}

function openAirportPanel(iata) {
  const ap = AIRPORTS[iata];
  if(!ap) return;
  currentPanelAp = iata;

  // Reset tabs
  document.querySelectorAll('.ap-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelector('.ap-tab[data-tab="overview"]').classList.add('active');
  document.getElementById('tab-overview').classList.add('active');
  currentTab='overview';

  // Header
  document.getElementById('ap-iata').textContent = iata;
  document.getElementById('ap-city').textContent  = ap.city;
  document.getElementById('ap-country').textContent = ap.continent||'';

  // Player status badges
  const net = getNetworkAirports();
  const isHub = ap.hub;
  const onNet = net.has(iata);
  const isMe  = iata === DEMO.playerLocation;
  const badges = [];
  if(isMe) badges.push('<span class="badge badge-amber">YOUR LOCATION</span>');
  else if(onNet) badges.push('<span class="badge badge-teal">YOUR NETWORK</span>');
  const tier = ap.routeCount>=50?'MAJOR HUB':ap.routeCount>=10?'REGIONAL':'SMALL';
  badges.push(`<span class="badge badge-dim">${tier}</span>`);
  if(isHub) badges.push('<span class="badge badge-dim">HUB AIRPORT</span>');
  document.getElementById('ap-badges').innerHTML = badges.join('');

  // Fetch data (can be slow for routes, do async-ish)
  setTimeout(()=>{ buildPanel(iata, ap); }, 10);

  // Open panel + fly map to airport
  panel.classList.add('open');
  flyTo(iata);
  staticDirty=true;
}

function buildPanel(iata, ap) {
  const airlines  = getAirlinesAtAirport(iata);
  const dests     = getDestinationsFromAirport(iata);
  const fleet     = getFleetAtAirport(iata);
  const net       = getNetworkAirports();

  cachedPanelData = {airlines, dests, fleet, ap};

  // Update tab counts
  document.getElementById('tc-airlines').textContent = airlines.length;
  document.getElementById('tc-dest').textContent     = dests.length;
  document.getElementById('tc-fleet').textContent    = fleet.length;

  renderOverview(iata, ap, airlines, dests, fleet, net);
  renderAirlines(airlines, net);
  renderDests(dests);
  renderFleet(fleet);
  renderActions(iata, ap, airlines, dests, net);
}

function renderOverview(iata, ap, airlines, dests, fleet, net) {
  const isMe = iata===DEMO.playerLocation;
  const onNet = net.has(iata);

  // Stat grid
  const topEarn = dests.reduce((m,d)=>Math.max(m,d.bestEarn),0);
  const avgDist = dests.length ? Math.round(dests.reduce((s,d)=>s+d.distMi,0)/dests.length) : 0;
  const stats = [
    {k:'Routes', v:ap.routeCount||0, cls:'am'},
    {k:'Airlines', v:airlines.length, cls:''},
    {k:'Destinations', v:dests.length, cls:''},
    {k:'Fleet types', v:fleet.length, cls:''},
    {k:'Top daily earn', v:'$'+(topEarn).toLocaleString(), cls:'tl'},
    {k:'Avg dist', v:(avgDist).toLocaleString()+' mi', cls:''},
  ];
  document.getElementById('ov-stats').innerHTML = stats.map(s=>
    `<div class="ov-cell"><div class="ov-key">${s.k}</div><div class="ov-val ${s.cls}">${s.v}</div></div>`
  ).join('');

  // Hub airlines at this airport
  const hubAirlines = airlines.filter(a=>{ const al=AIRLINES[a.code]; return al&&(al.primaryHub===iata||(al.hubs||[]).includes(iata)); });
  const ovHubHead = document.getElementById('ov-hubs-head');
  const ovHubs = document.getElementById('ov-hubs');
  if(hubAirlines.length){
    ovHubHead.style.display='block';
    ovHubs.innerHTML = hubAirlines.slice(0,6).map(a=>{
      const al=AIRLINES[a.code];
      return `<div class="airline-row">
        <div class="al-code">${a.code}</div>
        <div class="al-info"><div class="al-name">${a.name}</div>
          <div class="al-sub">${allianceBadge(a.alliance)||'No alliance'} · Primary hub</div></div>
        <div style="text-align:right">
          <div class="al-count">${a.routeCount}</div>
          <div class="al-owned">${a.code===DEMO.airlineCode?'YOURS':''}</div>
        </div></div>`;
    }).join('');
  } else {
    ovHubHead.style.display='none'; ovHubs.innerHTML='';
  }
}

function renderAirlines(airlines, net) {
  document.getElementById('al-list').innerHTML = airlines.map(a=>{
    const owned = a.code===DEMO.airlineCode;
    return `<div class="airline-row">
      <div class="al-code">${a.code}</div>
      <div class="al-info">
        <div class="al-name">${a.name}</div>
        <div class="al-sub">${allianceBadge(a.alliance)||'<span style="color:var(--dim)">No alliance</span>'} · ${a.routeCount} routes from here</div>
      </div>
      ${owned?'<div class="al-owned">YOURS</div>':''}</div>`;
  }).join('') || '<div class="empty-state">No airline data found</div>';
}

function renderDests(dests) {
  const sorted = [...dests];
  if(currentDestSort==='earn')    sorted.sort((a,b)=>b.bestEarn-a.bestEarn);
  if(currentDestSort==='dist')    sorted.sort((a,b)=>b.distMi-a.distMi);
  if(currentDestSort==='carriers') sorted.sort((a,b)=>b.carriers.length-a.carriers.length);

  const myCode = DEMO.airlineCode;
  document.getElementById('dest-list').innerHTML = sorted.map(d=>{
    const destAp = AIRPORTS[d.iata];
    const unlocked = isRouteUnlocked(currentPanelAp, d.iata);
    const weOperate = d.carriers.includes(myCode);
    return `<div class="dest-row">
      <div class="dest-iata">${d.iata}</div>
      <div class="dest-info">
        <div class="dest-city">${destAp?destAp.city:'—'}</div>
        <div class="dest-carriers">${d.carriers.slice(0,4).join('·')}${d.carriers.length>4?` +${d.carriers.length-4}`:''}</div>
      </div>
      <div class="dest-earn">
        <div class="dest-earn-val">$${d.bestEarn.toLocaleString()}</div>
        <div class="dest-dist">${(d.distMi).toLocaleString()} mi</div>
        ${unlocked?'<div class="dest-unlocked">UNLOCKED</div>':weOperate?'<div style="font-size:8px;color:var(--amber)">YOU OPERATE</div>':''}
      </div></div>`;
  }).join('') || '<div class="empty-state">No destinations found</div>';
}

function renderFleet(fleet) {
  // Group by manufacturer
  const byMfr = {};
  for(const ac of fleet){
    if(!byMfr[ac.mfr]) byMfr[ac.mfr]=[];
    byMfr[ac.mfr].push(ac);
  }
  const typeLabel = {W:'Wide-body',N:'Narrow-body',R:'Regional Jet',T:'Turboprop',P:'Prop',O:'Other'};
  document.getElementById('fleet-list').innerHTML = Object.entries(byMfr).sort().map(([mfr,acs])=>
    `<div class="fleet-group">
      <div class="fleet-mfr">${mfr}</div>
      ${acs.sort((a,b)=>b.routeCount-a.routeCount).map(ac=>
        `<div class="fleet-row">
          <div class="fleet-code">${ac.equipCode}</div>
          <div class="fleet-name">${ac.model}<div class="fleet-type">${typeLabel[ac.type]||ac.type}</div></div>
          <div class="fleet-cnt">${ac.routeCount}</div>
        </div>`).join('')}
    </div>`
  ).join('') || '<div class="empty-state">No fleet data found</div>';
}

function renderActions(iata, ap, airlines, dests, net) {
  const isMe     = iata===DEMO.playerLocation;
  const onNet    = net.has(iata);
  const weOperate = airlines.some(a=>a.code===DEMO.airlineCode);
  const actions  = [];

  if(isMe) {
    // Player is here — fly somewhere
    actions.push(`<button class="action-btn primary" onclick="openBookingModal('${iata}',null)"><div class="action-icon">✈</div>
      <div class="action-content"><div class="action-title">Fly somewhere from here</div>
      <div class="action-desc">Choose a destination on your network</div></div></button>`);
    actions.push(`<button class="action-btn" onclick="openUnlockModal('${iata}')"><div class="action-icon">🔓</div>
      <div class="action-content"><div class="action-title">Unlock routes from ${iata}</div>
      <div class="action-desc">Expand your network — ${weOperate?`${DEMO.airlineCode} operates here`:dests.length+' destinations available'}</div></div>
      <div class="action-cost">→</div></button>`);
  } else if(onNet) {
    // Can fly here
    actions.push(`<button class="action-btn primary" onclick="openBookingModal('${DEMO.playerLocation}','${iata}')"><div class="action-icon">✈</div>
      <div class="action-content"><div class="action-title">Book a flight to ${iata}</div>
      <div class="action-desc">Fly from ${DEMO.playerLocation}</div></div></button>`);
    if(weOperate){
      actions.push(`<button class="action-btn" onclick="openUnlockModal('${iata}')"><div class="action-icon">🔓</div>
        <div class="action-content"><div class="action-title">Unlock routes from ${iata}</div>
        <div class="action-desc">${DEMO.airlineCode} operates here — ${dests.length} destinations</div></div>
        <div class="action-cost">→</div></button>`);
    }
  } else {
    // Not on network
    actions.push(`<div class="context-block"><div class="context-label">Not on your network</div>
      <div class="context-val"><span class="hl">${iata}</span> is not reachable with your current routes. Unlock connecting routes to reach this airport.</div></div>`);
  }

  // Acquirable airline check
  const acqAirlines = airlines.filter(a=>{ const al=AIRLINES[a.code]; return al&&a.code!==DEMO.airlineCode; });
  if(acqAirlines.length>0){
    const top = acqAirlines[0];
    const al = AIRLINES[top.code];
    if(al){
      actions.push(`<button class="action-btn teal-btn" onclick="openAcqModal('${top.code}')"><div class="action-icon">🏢</div>
        <div class="action-content"><div class="action-title">Acquire ${top.name}</div>
        <div class="action-desc">${top.routeCount} routes here · ${al.routes} total routes</div></div>
        <div class="action-cost">$${(al.acquisitionCost/1000000).toFixed(0)}M</div></button>`);
    }
  }

  // Unlock cost of top route
  const topDest = dests[0];
  if(topDest&&!isRouteUnlocked(iata,topDest.iata)){
    actions.push(`<div class="context-block" style="margin-top:8px"><div class="context-label">Top opportunity</div>
      <div class="context-val" style="font-size:11px">
        <span class="hl">${iata} → ${topDest.iata}</span> · $${topDest.bestEarn.toLocaleString()}/day · 
        Unlock cost <span class="hl">$${topDest.bestUnlock.toLocaleString()}</span>
      </div></div>`);
  }

  document.getElementById('actions-list').innerHTML = actions.join('') ||
    '<div class="empty-state">No actions available</div>';
}

function getFleetAtAirport(iata) {
  if(typeof window.getFleetAtAirport!=='undefined') {
    return window.getFleetAtAirport(iata);
  }
  const idxs=AP_IDX[iata]||[], map={};
  const _EQ=9;
  for(const i of idxs){
    const eq=ROUTES[i][_EQ];
    if(!map[eq]){
      const ac=AIRCRAFT[eq];
      map[eq]={ equipCode:eq, model:ac?ac.model:eq, type:ac?ac.type:'?', mfr:ac?ac.mfr:'Unknown', routeCount:0 };
    }
    map[eq].routeCount++;
  }
  return Object.values(map).sort((a,b)=>b.routeCount-a.routeCount);
}

// ── Helpers ──────────────────────────────────────────
function fmt$(n) { return '$'+Math.round(n).toLocaleString(); }
function fmtMi(n) { return Math.round(n).toLocaleString()+' mi'; }

// Daily earnings from all currently unlocked routes
function calcDailyEarnings() {
  let total = 0;
  for (const key of DEMO.unlockedRoutes) {
    const [a,b] = key.split('|');
    const idxs  = AP_IDX[a]||[];
    for (const i of idxs) {
      const r = ROUTES[i];
      if ((r[0]===a&&r[1]===b)||(r[0]===b&&r[1]===a)) {
        if (r[2]===DEMO.airlineCode) { total+=r[7]||0; break; }
      }
    }
  }
  return total;
}

// Get all routes our airline operates from this airport that are NOT yet unlocked
function getUnlockableRoutesFrom(iata) {
  const idxs = AP_IDX[iata]||[];
  const results = [];
  const seen = new Set();
  for (const i of idxs) {
    const r = ROUTES[i];
    if (r[2]!==DEMO.airlineCode) continue;
    const dest = r[0]===iata ? r[1] : r[0];
    if (seen.has(dest)) continue;
    seen.add(dest);
    const key1=`${iata}|${dest}`, key2=`${dest}|${iata}`;
    results.push({
      from: iata, to: dest,
      unlocked: DEMO.unlockedRoutes.has(key1)||DEMO.unlockedRoutes.has(key2),
      earn:   r[7]||0,
      cost:   r[8]||0,
      distMi: r[4]||0,
      ecoFare: r[5]||0,
      bizFare: r[6]||0,
      freq:    r[3]||0,
      eq:      r[9]||'—',
      routeIdx: i,
    });
  }
  return results.sort((a,b)=>b.earn-a.earn);
}

// ── Modal state ───────────────────────────────────────
let unlockOrigin = null; // airport we're unlocking from
let selectedRoute = null;

const overlay    = document.getElementById('unlock-overlay');
const listView   = document.getElementById('um-route-list');
const detailView = document.getElementById('um-detail');
const umFooter   = document.getElementById('um-footer');

function openUnlockModal(iata) {
  unlockOrigin   = iata;

}

document.getElementById('um-close').onclick  = closeUnlockModal;
document.getElementById('um-cancel').onclick = ()=>{

  else closeUnlockModal();
};
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeUnlockModal(); });

// ── Route list ────────────────────────────────────────
function showRouteList(iata) {
  listView.style.display='block';
  detailView.style.display='none';
  umFooter.style.display='none';
  document.getElementById('um-cancel').textContent='Cancel';

  const routes = getUnlockableRoutesFrom(iata);
  const daily  = calcDailyEarnings();
  const atAirport = iata===DEMO.playerLocation;

  // Group: unlocked | can afford | can't afford
  const unlocked   = routes.filter(r=>r.unlocked);
  const affordable = routes.filter(r=>!r.unlocked && DEMO.balance>=r.cost);
  const broke      = routes.filter(r=>!r.unlocked && DEMO.balance<r.cost);

  let html='';

  if (!atAirport) {
    html+=`<div class="um-location-block" style="margin-bottom:12px">
      <div class="um-location-icon">📍</div>
      <div class="um-location-title">You're not at ${iata}</div>
      <div class="um-location-body">You're currently at <strong>${DEMO.playerLocation}</strong>. Fly to <strong>${iata}</strong> to unlock routes here.</div>
    </div>`;
  }

  if (affordable.length) {
    html+=`<div class="um-section-head">Available to unlock (${affordable.length})</div>`;
    html+=affordable.map(r=>routeCardHtml(r, 'available', atAirport)).join('');
  }
  if (broke.length) {
    html+=`<div class="um-section-head">Insufficient funds (${broke.length})</div>`;
    html+=broke.map(r=>routeCardHtml(r, 'broke', atAirport)).join('');
  }
  if (unlocked.length) {
    html+=`<div class="um-section-head">Already unlocked (${unlocked.length})</div>`;
    html+=unlocked.map(r=>routeCardHtml(r, 'unlocked', false)).join('');
  }
  if (!routes.length) {
    html='<div class="empty-state" style="padding:30px 0">No routes found for '+DEMO.airlineCode+' from '+iata+'</div>';
  }

  document.getElementById('um-list-content').innerHTML=html;

  // Wire clicks
  document.querySelectorAll('.route-card[data-dest]').forEach(card=>{
    card.addEventListener('click',()=>{
      if(card.classList.contains('unlocked')) return;
      const dest=card.dataset.dest;
      const r=routes.find(x=>x.to===dest);
      if(r) showRouteDetail(r);
    });
  });
}

function routeCardHtml(r, state, atAirport) {
  const ac=AIRCRAFT[r.eq];
  const acName=ac?ac.model:r.eq;
  const al=AIRLINES[DEMO.airlineCode];
  const locked=state==='unlocked'||!atAirport;
  const cls=state==='unlocked'?'unlocked':state==='broke'?'cant-afford':'';
  const tag=state==='unlocked'?'<span class="rc-tag rc-tag-done">ACTIVE</span>':
             state==='broke'  ?'<span class="rc-tag rc-tag-broke">NEED '+fmt$(r.cost-DEMO.balance)+' MORE</span>':'';
  const destAp=AIRPORTS[r.to];
  return `<div class="route-card ${cls}" data-dest="${r.to}">
    <div class="rc-airports">${r.from}<span class="ar">→</span>${r.to}${tag}</div>
    <div class="rc-body">
      <div class="rc-airline">${al?al.name:DEMO.airlineCode} · ${destAp?destAp.city:r.to}</div>
      <div class="rc-aircraft">${acName} · ${fmtMi(r.distMi)}</div>
    </div>
    <div class="rc-right">
      <div class="rc-earn">${fmt$(r.earn)}/day</div>
      <div class="rc-cost">${fmt$(r.cost)} to unlock</div>
    </div>
  </div>`;
}

// ── Route detail ──────────────────────────────────────
function showRouteDetail(r) {
  selectedRoute = r;
  listView.style.display='none';
  detailView.style.display='block';
  umFooter.style.display='flex';
  document.getElementById('um-cancel').textContent='← Back';

  const fromAp=AIRPORTS[r.from]||{city:r.from};
  const toAp  =AIRPORTS[r.to]  ||{city:r.to};
  const ac    =AIRCRAFT[r.eq]  ||{model:r.eq,type:'?'};

  document.getElementById('um-eyebrow').textContent='Route Details';
  document.getElementById('um-title').innerHTML=`<span>${r.from}</span><span class="arrow">→</span><span>${r.to}</span>`;

  document.getElementById('um-from-code').textContent=r.from;
  document.getElementById('um-from-city').textContent=fromAp.city;
  document.getElementById('um-to-code').textContent  =r.to;
  document.getElementById('um-to-city').textContent  =toAp.city;

  document.getElementById('ud-earn').textContent  = fmt$(r.earn)+'/day';
  document.getElementById('ud-dist').textContent  = fmtMi(r.distMi);
  document.getElementById('ud-ac').textContent    = ac.model;
  document.getElementById('ud-eco').textContent   = fmt$(r.ecoFare);
  document.getElementById('ud-biz').textContent   = fmt$(r.bizFare);
  document.getElementById('ud-freq').textContent  = r.freq+' flights/day';

  // Payback (always ~25 days by design)
  const payDays = r.earn>0 ? Math.round(r.cost/r.earn) : 25;
  document.getElementById('ud-payback-label').textContent=payDays+' game days';
  document.getElementById('ud-payback-note').textContent =
    `Earns back unlock cost in ${payDays} game days (${(payDays*15/60).toFixed(1)} real hours)`;

  // Balance
  const after = DEMO.balance - r.cost;
  document.getElementById('ud-bal-current').textContent=fmt$(DEMO.balance);
  document.getElementById('ud-bal-cost').textContent   ='-'+fmt$(r.cost);
  const afterEl=document.getElementById('ud-bal-after');
  afterEl.textContent=fmt$(Math.abs(after));
  afterEl.className='um-balance-v '+(after>=0?'green':'red');

  const atAirport = r.from===DEMO.playerLocation||r.to===DEMO.playerLocation;
  const canAfford = DEMO.balance>=r.cost;

  // Location block
  const locBlock=document.getElementById('ud-location-block');
  if(!atAirport){
    locBlock.style.display='block';
    const neededIata = AIRPORTS[r.from] ? r.from : r.to;
    document.getElementById('ud-location-body').innerHTML=
      `You're at <strong>${DEMO.playerLocation}</strong>. You must be at <strong>${r.from}</strong> or <strong>${r.to}</strong> to unlock this route.`;
  } else locBlock.style.display='none';

  // Broke block
  const brokeBlock=document.getElementById('ud-broke-block');
  if(!canAfford&&atAirport){
    brokeBlock.style.display='block';
    const daily=calcDailyEarnings();
    const daysNeeded=daily>0?Math.ceil((r.cost-DEMO.balance)/daily):null;

// ── Arc animation ─────────────────────────────────────
const arcCanvas  = document.getElementById('arc-canvas');
const arcCtx     = arcCanvas.getContext('2d');
let activeArcs   = []; // [{pts, progress, color, done}]

function animateNewArc(fromIata, toIata, onComplete) {
  const apA=AIRPORTS[fromIata], apB=AIRPORTS[toIata];
  if(!apA||!apB) { if(onComplete) onComplete(); return; }
  const pts = gcPts(apA.lat,apA.lng,apB.lat,apB.lng,120);
  activeArcs.push({ pts, progress:0, onComplete, done:false });
  if(activeArcs.length===1) requestAnimationFrame(arcFrame);
}

let lastArcTime=0;
function arcFrame(now) {
  if(!lastArcTime) lastArcTime=now;
  const dt=Math.min(now-lastArcTime, 50);
  lastArcTime=now;

  arcCtx.clearRect(0,0,W,H);
  let anyActive=false;

  for(const arc of activeArcs){
    if(arc.done) continue;
    arc.progress=Math.min(1, arc.progress+dt/1200);

    // Draw arc up to current progress
    const end=Math.floor(arc.pts.length*arc.progress);
    if(end<2){anyActive=true;continue;}

    // Trailing glow
    arcCtx.save();
    arcCtx.lineWidth=3;
    arcCtx.strokeStyle='rgba(92,138,122,0.7)';
    arcCtx.shadowColor='rgba(92,138,122,0.9)';
    arcCtx.shadowBlur=8;
    arcCtx.beginPath();
    let f=true,px=null;
    for(let i=0;i<end;i++){
      const [lat,lng]=arc.pts[i];
      const {sx,sy}=w2s(proj(lng,lat).x,proj(lng,lat).y);
      if(f){arcCtx.moveTo(sx,sy);f=false;px=sx;continue;}
      if(Math.abs(sx-px)>W*0.4) arcCtx.moveTo(sx,sy);
      else arcCtx.lineTo(sx,sy);
      px=sx;
    }
    arcCtx.stroke();

    // Leading dot
    const [lat,lng]=arc.pts[Math.max(0,end-1)];
    const {sx,sy}=w2s(proj(lng,lat).x,proj(lng,lat).y);
    arcCtx.beginPath();
    arcCtx.arc(sx,sy,5,0,Math.PI*2);
    arcCtx.fillStyle='rgba(200,146,60,0.9)';
    arcCtx.shadowColor='rgba(200,146,60,1)';
    arcCtx.shadowBlur=12;
    arcCtx.fill();
    arcCtx.restore();

    if(arc.progress>=1){
      arc.done=true;
      arcCtx.clearRect(0,0,W,H);
      staticDirty=true; // force map redraw with new permanent route
      if(arc.onComplete) arc.onComplete();
    } else anyActive=true;
  }

  activeArcs=activeArcs.filter(a=>!a.done);
  if(anyActive) requestAnimationFrame(arcFrame);
  else { lastArcTime=0; arcCtx.clearRect(0,0,W,H); }
}

function showToast(type, title, msg, dur=4000) {
  const icons={success:'✅',warning:'⚠️',info:'✈'};

  el.className=`toast ${type}`;
  el.innerHTML=`<div class="toast-icon">${icons[type]||'•'}</div>
    <div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div>

  el.querySelector('.toast-close').onclick=()=>dismissToast(el);
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>dismissToast(el), dur);
}

var _prevDrawRoutes = drawRoutes;
drawRoutes = function(c){
  c.setLineDash([]);
  c.lineWidth=Math.max(0.8,1.4/scale);
  for(var key of DEMO.unlockedRoutes){ var p=key.split('|'); _drawArcSeg(c,p[0],p[1],'rgba(92,138,122,0.52)',Math.max(0.8,1.4/scale)); }

  if(DEMO.acquiredRoutes.size>0){
    c.setLineDash([Math.max(2,4/scale),Math.max(2,4/scale)]);
    for(var key3 of DEMO.acquiredRoutes){ var p3=key3.split('|'); _drawArcSeg(c,p3[0],p3[1],'rgba(92,138,122,0.2)',Math.max(0.5,0.8/scale)); }
    c.setLineDash([]);
  }
};
function _drawArcSeg(c,fromIata,toIata,color,lw){
  var apA=AIRPORTS[fromIata],apB=AIRPORTS[toIata]; if(!apA||!apB) return;
  var pts=gcPts(apA.lat,apA.lng,apB.lat,apB.lng,60);
  c.lineWidth=lw; c.strokeStyle=color; c.beginPath();
  var f=true,px=null;
  for(var i=0;i<pts.length;i++){
    var lat=pts[i][0],lng=pts[i][1];
    var s=w2s(proj(lng,lat).x,proj(lng,lat).y);
    if(f){c.moveTo(s.sx,s.sy);f=false;px=s.sx;continue;}
    if(Math.abs(s.sx-px)>W*0.4)c.moveTo(s.sx,s.sy);else c.lineTo(s.sx,s.sy);px=s.sx;
  }
  c.stroke();
}

// ── Utility ──────────────────────────────────────────
function flightDurationMs(distMi) {
  // Speed tiers (mph) → duration in real ms (game-scaled for fun)
  // Actual duration in game time: ~0.3–0.8 game days
  // In real minutes at 1x: 4–12 real minutes per flight
  const mph = distMi < 500 ? 350 : distMi < 2000 ? 480 : distMi < 5000 ? 530 : 560;
  const hrs  = distMi / mph;
  // 1 game day = 15 real min → 1 game hour = 1.25 real min
  return hrs * 1.25 * 60 * 1000; // real ms
}

function flightNo(airlineCode, routeIdx) {
  return airlineCode + String(1000 + (routeIdx % 9000)).slice(1);
}

function randomGate() {
  const letters = 'ABCDEFGH';
  return letters[Math.floor(Math.random()*letters.length)] + (Math.floor(Math.random()*30)+1);
}

function randomSeat(seatClass) {
  if (seatClass === 'business') return (Math.floor(Math.random()*4)+1) + ['A','C','D','F'][Math.floor(Math.random()*4)];
  return (Math.floor(Math.random()*30)+10) + ['A','B','C','D','E','F'][Math.floor(Math.random()*6)];
}

function fmtDuration(ms) {
  const totalMin = Math.round(ms / 60000);
  const h = Math.floor(totalMin / 60), m = totalMin % 60;
  return h + 'h ' + String(m).padStart(2,'0') + 'm';
}

function fmtGameTime(gameDay, progressFraction) {
  const totalHours = Math.floor(progressFraction * 24);
  const h = totalHours % 12 || 12;
  const ampm = totalHours < 12 ? 'AM' : 'PM';
  const min  = Math.floor((progressFraction * 24 * 60) % 60);
  return `${h}:${String(min).padStart(2,'0')} ${ampm}`;
}

// Get connectable destinations from current player location
function getNetworkDestinations(fromIata) {
  const net = getNetworkAirports();
  const dests = [];
  for (const key of DEMO.unlockedRoutes) {
    const [a, b] = key.split('|');
    const dest = a === fromIata ? b : b === fromIata ? a : null;
    if (dest && net.has(dest)) dests.push(dest);
  }
  // Also acquired starting routes
  for (const key of DEMO.acquiredStarting) {
    const [a, b] = key.split('|');
    const dest = a === fromIata ? b : b === fromIata ? a : null;
    if (dest && !dests.includes(dest)) dests.push(dest);
  }
  return dests;
}

function sortAndRenderFlights() {
  let sorted = [...bkAllFlights];
  if (bkSort === 'price')  sorted.sort((a,b) => a.ecoFare - b.ecoFare);
  if (bkSort === 'dur')    sorted.sort((a,b) => a.distMi  - b.distMi);
  // default 'time': sort by dailyFreq desc (proxy for scheduled times)
  if (bkSort === 'time')   sorted.sort((a,b) => b.dailyFreq - a.dailyFreq);

  const distMi = sorted[0] ? sorted[0].distMi : 0;
  const durMs  = flightDurationMs(distMi);

  document.getElementById('bk-flight-list').innerHTML = sorted.map((f, i) => {
    const depHour = (6 + i * 2) % 24;
    const depMin  = i % 2 === 0 ? '00' : '30';
    const arrHour = (depHour + Math.round(durMs/3600000)) % 24;
    const arrMin  = depMin;
    const isSel   = bkSelectedFlight && bkSelectedFlight.routeIdx === f.routeIdx;
    const ac      = AIRCRAFT[f.equipCode] || {};
    return `<div class="flight-row ${isSel ? 'selected' : ''}" data-ridx="${f.routeIdx}">
      <div class="fr-airline">${f.airlineCode}</div>
      <div class="fr-info">
        <div class="fr-name">${f.airlineName} · ${flightNo(f.airlineCode, f.routeIdx)}</div>
        <div class="fr-times"><span class="dep">${depHour}:${depMin}</span> → ${arrHour}:${arrMin} · ${fmtDuration(durMs)}</div>
        <div class="fr-aircraft">${ac.model || f.equipCode} · ${f.distMi.toLocaleString()} mi</div>
      </div>
      <div class="fr-fares">
        <div class="fare-opt" onclick="selectFlight(${f.routeIdx},'economy');event.stopPropagation()">
          <div class="fare-label">ECO</div>
          <div class="fare-price">${fmt$(f.ecoFare)}</div>
          <div class="fare-radio ${isSel && bkSelectedClass==='economy'?'sel':''}"></div>
        </div>
        <div class="fare-opt" onclick="selectFlight(${f.routeIdx},'business');event.stopPropagation()">
          <div class="fare-label">BIZ</div>
          <div class="fare-price biz">${fmt$(f.bizFare)}</div>
          <div class="fare-radio ${isSel && bkSelectedClass==='business'?'sel':''}"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Wire row clicks
  document.querySelectorAll('.flight-row').forEach(row => {
    row.addEventListener('click', () => {
      const ridx = parseInt(row.dataset.ridx);
      const f = bkAllFlights.find(x => x.routeIdx === ridx);
      if (f) selectFlight(ridx, bkSelectedClass || 'economy');
    });
  });
}

function selectFlight(routeIdx, seatClass) {
  bkSelectedFlight = bkAllFlights.find(f => f.routeIdx === routeIdx);
  bkSelectedClass  = seatClass;
  const fare = seatClass === 'business' ? bkSelectedFlight.bizFare : bkSelectedFlight.ecoFare;
  document.getElementById('bk-sel-info').innerHTML =
    `<strong>${bkSelectedFlight.airlineName}</strong> · ${seatClass === 'business' ? 'Business' : 'Economy'} · <strong>${fmt$(fare)}</strong>`;
  document.getElementById('bk-confirm').disabled = false;
  sortAndRenderFlights(); // re-render to update radio state
}

// Sort buttons
document.querySelectorAll('.bk-sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bk-sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

document.getElementById('bk-confirm').onclick = () => {

// ── FLIGHT TRACKER ────────────────────────────────────
const trackerBar = document.getElementById('tracker-bar');
let flightInterval = null;

function startFlight(data) {
  activeFlightData = { ...data, startMs: performance.now() };

  document.getElementById('trk-flight').textContent = data.flightNo;
  document.getElementById('trk-from').textContent   = data.from;
  document.getElementById('trk-to').textContent     = data.to;
  document.getElementById('trk-alt').textContent    = '35,000 ft';

  trackerBar.classList.add('open');
  closePanel();

  // Animate the plane on the map arc
  animateNewArc(data.from, data.to);

  // Log flight
  DEMO.flightLog.push({
    from: data.from, to: data.to,
    airline: data.airlineCode, flightNo: data.flightNo,
    seatClass: data.seatClass, fare: data.fare,
    distMi: data.distMi, day: DEMO.day,
    aircraft: data.aircraft,
  });

  // Start tracker tick
  clearInterval(flightInterval);
  flightInterval = setInterval(() => tickFlight(), 500);

  showToast('info', 'Boarding complete', `${data.flightNo} · ${data.from} → ${data.to} · ${fmtDuration(data.durMs)}`);
}

function tickFlight() {
  if (!activeFlightData) return;
  const elapsed  = performance.now() - activeFlightData.startMs;
  const progress = Math.min(1, elapsed / activeFlightData.durMs);
  const remMs    = Math.max(0, activeFlightData.durMs - elapsed);

  document.getElementById('trk-fill').style.width = (progress * 100) + '%';
  document.getElementById('trk-rem').textContent  = fmtDuration(remMs);
  document.getElementById('trk-eta').textContent  = `ETA ${fmtDuration(remMs)}`;

  // Altitude: cruise at 35k, descend last 15%
  if (progress > 0.85) {
    const descent = Math.round(35000 * (1 - (progress - 0.85) / 0.15));
    document.getElementById('trk-alt').textContent = descent.toLocaleString() + ' ft';
  }

  if (progress >= 1) land();
}

function land() {
  clearInterval(flightInterval);
  const data = activeFlightData;
  activeFlightData = null;

  // Update player location
  DEMO.playerLocation = data.to;
  document.getElementById('hud-loc').textContent = data.to;

  trackerBar.classList.remove('open');
  staticDirty = true;

  // Update airport panel if open
  if (currentPanelAp) openAirportPanel(currentPanelAp);

  showToast('success', `Landed at ${data.to}`,
    `${data.from} → ${data.to} · ${data.distMi.toLocaleString()} mi · Welcome to ${(AIRPORTS[data.to]||{}).city || data.to}`);
}

document.getElementById('trk-land-btn').onclick = land;

// Escape closes booking/boarding
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (bpOverlay.classList.contains('open')) {
      bpOverlay.classList.remove('open');
      if (bpOverlay._pendingFlight) startFlight(bpOverlay._pendingFlight);
    } else if (bookOverlay.classList.contains('open')) {
      closeBookingModal();
    }
  }
});

// ── Day tick engine ───────────────────────────────────
// Each game day = 15 real minutes. We accumulate a fractional day counter.
let lastTickTime = performance.now();

function economyTick() {
  const now  = performance.now();
  const realMs = now - lastTickTime;
  lastTickTime = now;

  // Current speed multiplier
  const spd = DEMO.gameSpeed || 1;
  // 1 game day = 15 real min at 1x speed
  const gameDaysElapsed = (realMs * spd) / (15 * 60 * 1000);

  DEMO.dayProgress = (DEMO.dayProgress || 0) + gameDaysElapsed;

  // Process each full game day that has passed
  while (DEMO.dayProgress >= 1) {
    DEMO.dayProgress -= 1;
    DEMO.day++;
    processGameDay();
  }

  // Update HUD day bar
  const barEl = document.getElementById('hud-daybar');
  if (barEl) barEl.style.width = ((DEMO.dayProgress || 0) * 100) + '%';
  document.getElementById('hud-day').textContent = DEMO.day;
}

function processGameDay() {
  // Airline earnings from all active routes
  let dayEarn = 0;
  for (const key of DEMO.unlockedRoutes) {
    const [a, b] = key.split('|');
    const idxs = AP_IDX[a] || [];
    for (const i of idxs) {
      const r = ROUTES[i];
      if (((r[0]===a&&r[1]===b)||(r[0]===b&&r[1]===a)) && r[2]===DEMO.airlineCode) {
        dayEarn += r[7] || 0; break;
      }
    }
  }
  // Add acquired starting routes earnings
  for (const key of DEMO.acquiredStarting) {
    const [a, b] = key.split('|');
    const idxs = AP_IDX[a] || [];
    for (const i of idxs) {
      const r = ROUTES[i];
      if ((r[0]===a&&r[1]===b)||(r[0]===b&&r[1]===a)) {
        dayEarn += r[7] || 0; break;
      }
    }
  }

  DEMO.balance     += dayEarn;
  DEMO.totalEarned += dayEarn;

  // CEO salary
  DEMO.ceoBalance  += DEMO.ceoSalary;

  // Track earnings history (last 14 days)
  DEMO.earningsHistory.push(dayEarn);
  if (DEMO.earningsHistory.length > 14) DEMO.earningsHistory.shift();

  // Check salary milestones
  const totalRoutes = DEMO.unlockedRoutes.size + DEMO.acquiredStarting.size;
  checkSalaryMilestones(totalRoutes);

  // Update HUD balance
  document.getElementById('hud-bal').textContent = fmt$(DEMO.balance);

  // Show day tick earnings notification (subtle)
  if (dayEarn > 0) showDayTick(dayEarn);

  // Refresh CEO panel if open
  if (document.getElementById('ceo-panel').classList.contains('open')) renderCeoPanel();
}

function showDayTick(earn) {
  // Remove any existing tick toast
  const old = document.getElementById('day-tick-toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.id = 'day-tick-toast';
  el.className = 'day-tick-toast';
  el.textContent = '+' + fmt$(earn) + ' · Day ' + DEMO.day;
  document.getElementById('game-container').appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 3000);
}

function checkSalaryMilestones(totalRoutes) {
  for (let i = SALARY_MILESTONES.length - 1; i >= 0; i--) {
    const ms = SALARY_MILESTONES[i];
    if (totalRoutes >= ms.routes && i > DEMO.lastSalaryMilestone) {
      DEMO.lastSalaryMilestone = i;
      DEMO.ceoSalary = ms.salary;
      document.getElementById('hud-ceo-sal').textContent = fmt$(ms.salary) + '/day';
      showPromotion(ms, totalRoutes);
      break;
    }
  }
}

function renderCeoPanel() {
  const totalRoutes = DEMO.unlockedRoutes.size + DEMO.acquiredStarting.size;

  // Current milestone
  let curMilestone = null, nextMilestone = null;
  for (let i = SALARY_MILESTONES.length - 1; i >= 0; i--) {
    if (totalRoutes >= SALARY_MILESTONES[i].routes) { curMilestone = SALARY_MILESTONES[i]; break; }
  }
  for (let i = 0; i < SALARY_MILESTONES.length; i++) {
    if (totalRoutes < SALARY_MILESTONES[i].routes) { nextMilestone = SALARY_MILESTONES[i]; break; }
  }

  const stageName = curMilestone ? curMilestone.stage : 'Pre-Launch';
  const stageLabel = curMilestone ? curMilestone.label : 'Unlock 5 routes to begin earning.';
  document.getElementById('ceo-stage-title').textContent = stageName;
  document.getElementById('ceo-stage-sub').textContent   = stageLabel;
  document.getElementById('ceo-stage-label').textContent = stageName;
  document.getElementById('ceo-salary-amount').textContent = fmt$(DEMO.ceoSalary);
  document.getElementById('ceo-personal-bal').textContent  = fmt$(DEMO.ceoBalance);

  // Milestone ladder
  const ladder = document.getElementById('ceo-milestone-ladder');
  ladder.innerHTML = SALARY_MILESTONES.map(ms => {
    const done    = totalRoutes >= ms.routes && ms !== nextMilestone;
    const current = curMilestone && ms.routes === curMilestone.routes;
    const state   = current ? 'current' : done ? 'done' : 'future';
    return `<div class="milestone-row ${state}">
      <div class="ms-dot ${state}"></div>
      <div class="ms-body">
        <div class="ms-stage">${ms.stage}</div>
        <div class="ms-routes">${ms.routes} routes · ${ms.label}</div>
      </div>
      <div class="ms-sal ${current?'current':''}">${fmt$(ms.salary)}/day</div>
    </div>`;
  }).join('');

  // Progress to next
  if (nextMilestone && curMilestone) {
    const prev  = curMilestone.routes;
    const next  = nextMilestone.routes;
    const pct   = Math.min(100, ((totalRoutes - prev) / (next - prev)) * 100);
    document.getElementById('ceo-next-label-l').textContent = `${totalRoutes} / ${next} routes`;
    document.getElementById('ceo-next-label-r').textContent = `+${fmt$(nextMilestone.salary - DEMO.ceoSalary)}/day at ${next}`;
    document.getElementById('ceo-next-fill').style.width = pct + '%';
    document.getElementById('ceo-next-wrap').style.display = 'block';
  } else if (!nextMilestone) {
    document.getElementById('ceo-next-label-l').textContent = 'Maximum salary reached';
    document.getElementById('ceo-next-label-r').textContent = '';
    document.getElementById('ceo-next-fill').style.width = '100%';
  }

  // Financial stats
  const dailyEarn = calcDailyEarnings();
  document.getElementById('fin-airline-bal').textContent  = fmt$(DEMO.balance);
  document.getElementById('fin-daily-earn').textContent   = fmt$(dailyEarn) + '/day';
  document.getElementById('fin-routes').textContent       = totalRoutes;
  document.getElementById('fin-airlines').textContent     = DEMO.ownedAirlines.length;
  document.getElementById('fin-total-earned').textContent = fmt$(DEMO.totalEarned);
  document.getElementById('fin-game-day').textContent     = 'Day ' + DEMO.day;

  // Earnings history chart
  const chart = document.getElementById('earn-chart');
  const hist  = DEMO.earningsHistory;
  if (hist.length > 0) {
    const max = Math.max(...hist, 1);
    chart.innerHTML = hist.map((v, i) => {
      const h = Math.max(4, Math.round((v / max) * 52));
      const isToday = i === hist.length - 1;
      return `<div class="earn-bar-wrap">
        <div class="earn-bar ${isToday?'today':''}" style="height:${h}px"></div>
        <div class="earn-day">${i === hist.length-1 ? 'now' : (hist.length-1-i)+'d'}</div>
      </div>`;
    }).join('');
  } else {
    chart.innerHTML = '<div style="font-size:9px;color:var(--dim);padding:8px 0">Earnings will appear here as game days pass.</div>';
  }

  // Bonus log

// ── Check helpers ─────────────────────────────────────
function totalActiveRoutes() {
  return DEMO.unlockedRoutes.size + DEMO.acquiredStarting.size;
}
function hasAllAlliances() {
  const alliances = new Set();
  for (const code of DEMO.ownedAirlines) {
    const al = AIRLINES[code];
    if (al && al.alliance && al.alliance !== 'None') alliances.add(al.alliance);
  }
  return alliances.size >= 3;
}
function networkFleetFamilies() {
  const families = new Set();
  for (const key of [...DEMO.unlockedRoutes, ...DEMO.acquiredStarting]) {
    const [a, b] = key.split('|');
    const idxs = AP_IDX[a] || [];
    for (const i of idxs) {
      const r = ROUTES[i];
      if ((r[0]===a&&r[1]===b)||(r[0]===b&&r[1]===a)) {
        const ac = AIRCRAFT[r[9]];
        if (ac) families.add(ac.family || r[9]);
        break;
      }
    }
  }
  return families.size;
}
function hasNetworkAcType(type) {
  for (const key of [...DEMO.unlockedRoutes, ...DEMO.acquiredStarting]) {
    const [a, b] = key.split('|');
    const idxs = AP_IDX[a] || [];
    for (const i of idxs) {
      const r = ROUTES[i];
      if ((r[0]===a&&r[1]===b)||(r[0]===b&&r[1]===a)) {
        const ac = AIRCRAFT[r[9]];
        if (ac && ac.type === type) return true;
        break;
      }
    }
  }
  return false;
}
function networkContinents() {
  const conts = new Set();
  for (const key of [...DEMO.unlockedRoutes, ...DEMO.acquiredStarting]) {
    const [a, b] = key.split('|');
    const apA = AIRPORTS[a], apB = AIRPORTS[b];
    if (apA && apA.continent && apA.continent !== '?') conts.add(apA.continent);
    if (apB && apB.continent && apB.continent !== '?') conts.add(apB.continent);
  }
  return conts.size;
}

// Trophy checks on flight log
function trophyCheck_wheelsUp()    { return DEMO.flightLog.length >= 1; }
function trophyCheck_bizClass()    { return DEMO.flightLog.some(f => f.seatClass === 'business'); }
function trophyCheck_jetSetter()   { return new Set(DEMO.flightLog.map(f => f.from+'|'+f.to)).size >= 10; }
function trophyCheck_frequent()    { return DEMO.flightLog.length >= 25; }
function trophyCheck_aroundWorld() {
  const conts = new Set();
  for (const f of DEMO.flightLog) {
    const a = AIRPORTS[f.from], b = AIRPORTS[f.to];
    if (a && a.continent !== '?') conts.add(a.continent);
    if (b && b.continent !== '?') conts.add(b.continent);
  }
  return conts.size >= 6;
}
function trophyCheck_widebody()    { return DEMO.flightLog.some(f => { const ac = AIRCRAFT[getFlightAcCode(f)]; return ac && ac.type==='Wide'; }); }
function trophyCheck_turboprop()   { return DEMO.flightLog.some(f => { const ac = AIRCRAFT[getFlightAcCode(f)]; return ac && ac.type==='Turbo'; }); }
function trophyCheck_allAlliances(){ const a=new Set(DEMO.flightLog.map(f=>{ const al=AIRLINES[f.airline]; return al?al.alliance:'None'; }).filter(a=>a!=='None')); return a.size>=3; }
function trophyCheck_ownAirline()  { return DEMO.flightLog.some(f => DEMO.ownedAirlines.includes(f.airline)); }
function trophyCheck_miles10k()    { return totalMilesFlown() >= 10000; }
function trophyCheck_miles50k()    { return totalMilesFlown() >= 50000; }
function trophyCheck_miles100k()   { return totalMilesFlown() >= 100000; }
function trophyCheck_acCollector() { return new Set(DEMO.flightLog.map(f=>f.aircraft)).size >= 10; }
function trophyCheck_kangaroo()    { return DEMO.flightLog.some(f => (f.from==='SYD'&&f.to==='LHR')||(f.from==='LHR'&&f.to==='SYD')); }
function trophyCheck_islandHop()   {
  return DEMO.flightLog.some(f => {
    const ac = AIRCRAFT[getFlightAcCode(f)];
    if (!ac || ac.type !== 'Turbo') return false;
    const a = AIRPORTS[f.from], b = AIRPORTS[f.to];
    return a && b && a.continent === b.continent && (a.continent === 'OC' || a.continent === 'AS');
  });
}

function totalMilesFlown() { return DEMO.flightLog.reduce((s,f) => s+(f.distMi||0), 0); }
function getFlightAcCode(f) {
  // Try to find equipment code from routes for this flight
  const opts = getFlightOptions(f.from, f.to);
  const match = opts.find(o => o.airlineCode === f.airline);
  return match ? match.equipCode : '';
}

function checkAllAchievements() {
  // Money achievements
  for (const ach of MONEY_ACHIEVEMENTS) {
    if (DEMO.unlockedAch.has(ach.id)) continue;
    if (ach.check()) {
      DEMO.unlockedAch.add(ach.id);
      DEMO.balance += ach.reward;
      document.getElementById('hud-bal').textContent = fmt$(DEMO.balance);
      fireAchievement(ach, 'money');
    }
  }
  // Trophy achievements
  for (const ach of TROPHY_ACHIEVEMENTS) {
    if (DEMO.unlockedAch.has(ach.id)) continue;
    const checkFn = TROPHY_CHECKS[ach.id];
    if (checkFn && checkFn()) {
      DEMO.unlockedAch.add(ach.id);
      fireAchievement(ach, 'trophy');
    }
  }
  // Refresh screen 2 if open
  if (document.getElementById('screen2').classList.contains('open')) renderScreen2();
}

function fireAchievement(ach, type) {
  const el = document.createElement('div');
  el.className = 'ach-notif';
  const isMoney = type === 'money';
  el.innerHTML = `
    <div class="ach-notif-icon">${ach.icon || (isMoney ? '💰' : '🏆')}</div>
    <div class="ach-notif-body">
      <div class="ach-notif-label">${isMoney ? 'Achievement — Reward Earned' : 'Trophy Unlocked'}</div>
      <div class="ach-notif-title">${ach.title}</div>
      ${isMoney ? `<div class="ach-notif-reward">+${fmt$(ach.reward)} credited to balance</div>` : ''}
    </div>`;
  document.getElementById('ach-notify').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toastOut .3s ease forwards';
    setTimeout(() => el.remove(), 320);
  }, 4500);
}

function renderFlightLogPane() {
  const log = [...DEMO.flightLog];

  if (sort === 'miles') log.sort((a,b) => (b.distMi||0) - (a.distMi||0));
  if (sort === 'fare')  log.sort((a,b) => (b.fare||0) - (a.fare||0));
  // default: most recent (already in order)

  const totalMiles = log.reduce((s,f)=>s+(f.distMi||0),0);
  const uniqueRoutes = new Set(log.map(f=>f.from+'|'+f.to)).size;
  const uniqueTypes  = new Set(log.map(f=>f.aircraft)).size;

  document.getElementById('th-flights').textContent = log.length;
  document.getElementById('th-miles').textContent   = totalMiles >= 1000 ? Math.round(totalMiles/1000)+'k' : totalMiles;
  document.getElementById('th-routes').textContent  = uniqueRoutes;
  document.getElementById('th-types').textContent   = uniqueTypes;
  document.getElementById('fl-count').textContent   = log.length;

  const empty = document.getElementById('fl-empty');
  const table = document.getElementById('fl-table');

  if (!log.length) {
    empty.style.display = 'block';
    table.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = log.slice().reverse().map(f => {
    const classCls = f.seatClass === 'business' ? 'fl-class-biz' : 'fl-class-eco';
    const al = AIRLINES[f.airline] || {};

      <td><div class="fl-route">${f.from} → ${f.to}</div></td>

      <td style="font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;color:var(--amber)">${fmt$(f.fare||0)}</td>
      <td style="font-size:9px;color:var(--dim)">${f.day||'—'}</td>

function renderMoneyAchievements() {
  const total = totalActiveRoutes();
  let unlocked = 0;
  const html = MONEY_ACHIEVEMENTS.map(ach => {
    const done = DEMO.unlockedAch.has(ach.id);
    if (done) unlocked++;
    // Progress bar value
    let pct = 0, progLabel = '';
    if (ach.id === 'first_flight')   { pct = Math.min(100, total*100); }
    else if (ach.id === 'off_ground') { pct = Math.min(100, total/5*100); progLabel = total+'/5'; }
    else if (ach.id === 'building_net') { pct = Math.min(100, total/10*100); progLabel = total+'/10'; }
    else if (ach.id === 'regional')   { pct = Math.min(100, total/25*100); progLabel = total+'/25'; }
    else if (ach.id === 'major_carrier'){ pct = Math.min(100, total/50*100); progLabel = total+'/50'; }
    else if (ach.id === 'global_net') { pct = Math.min(100, total/100*100); progLabel = total+'/100'; }
    else if (ach.id === 'first_acq')  { pct = Math.min(100, DEMO.ownedAirlines.length/2*100); progLabel = DEMO.ownedAirlines.length+'/2 airlines'; }
    else if (ach.id === 'portfolio')  { pct = Math.min(100, DEMO.ownedAirlines.length/3*100); progLabel = DEMO.ownedAirlines.length+'/3 airlines'; }
    else if (ach.id === 'empire')     { pct = Math.min(100, DEMO.ownedAirlines.length/5*100); progLabel = DEMO.ownedAirlines.length+'/5 airlines'; }
    else if (ach.id === 'first_hour') { pct = Math.min(100, DEMO.day/4*100); progLabel = 'Day '+DEMO.day+'/4'; }
    else if (ach.id === 'dedicated_ceo') { pct = Math.min(100, DEMO.day/24*100); progLabel = 'Day '+DEMO.day+'/24'; }
    else { pct = done ? 100 : 0; }

    const fillCls = done ? 'done' : 'prog';
    return `<div class="ach-money-card ${done?'unlocked':''}">
      <div class="acm-header">
        <div class="acm-title">${ach.title}</div>
        <div class="acm-reward">${fmt$(ach.reward)}</div>
      </div>
      <div class="acm-trigger">${ach.trigger}</div>
      <div class="acm-progress-bar"><div class="acm-progress-fill ${fillCls}" style="width:${pct}%"></div></div>
      <div class="acm-status ${done?'done':'prog'}">${done ? '✓ Reward claimed' : (progLabel || 'In progress')}</div>
    </div>`;
  }).join('');
  document.getElementById('ach-money-grid').innerHTML = html;
  document.getElementById('ach-money-count').textContent = unlocked + ' / ' + MONEY_ACHIEVEMENTS.length;
}

    <div class="ob-sum-cell"><div class="ob-sum-k">IATA Code</div><div class="ob-sum-v am">${obSelectedAirline}</div></div>
    <div class="ob-sum-cell"><div class="ob-sum-k">Home Hub</div><div class="ob-sum-v">${al.hub || '—'}</div></div>
    <div class="ob-sum-cell"><div class="ob-sum-k">Alliance</div><div class="ob-sum-v">${al.alliance || '—'}</div></div>
    <div class="ob-sum-cell"><div class="ob-sum-k">Starting Capital</div><div class="ob-sum-v am">$${obSelectedBudget.toLocaleString()}</div></div>
    <div class="ob-sum-cell"><div class="ob-sum-k">Starting Day</div><div class="ob-sum-v">Day 1</div></div>`;
}

function launchGame() {
  const al = STARTER_AIRLINES.find(a => a.code === obSelectedAirline);
  if (!al) return;

  // Configure DEMO from onboarding choices
  DEMO.airlineCode    = obSelectedAirline;
  DEMO.airlineName    = al.name;
  DEMO.hub            = al.hub;
  DEMO.playerLocation = al.hub;
  DEMO.balance        = obSelectedBudget;
  DEMO.day            = 1;
  DEMO.unlockedRoutes = new Set();
  DEMO.acquiredRoutes  = new Set();
  DEMO.acquiredStarting = new Set();
  DEMO.ownedAirlines   = [obSelectedAirline];
  DEMO.ceoSalary       = 0;
  DEMO.ceoBalance      = 500;  // small personal seed
  DEMO.totalEarned     = 0;
  DEMO.ceoBonuses      = [];
  DEMO.earningsHistory = [];
  DEMO.flightLog       = [];
  DEMO.unlockedAch     = new Set();
  DEMO.lastSalaryMilestone = -1;
  DEMO.dayProgress     = 0;
  DEMO.gameSpeed       = 1;
  DEMO.gameStartTime   = performance.now();

  // Dismiss onboarding
  const ob = document.getElementById('onboarding');
  ob.style.transition = 'opacity .4s';
  ob.style.opacity = '0';
  setTimeout(() => { ob.style.display = 'none'; }, 420);

  // Update HUD immediately
  document.getElementById('hud-airline').textContent = al.name;
  document.getElementById('hud-loc').textContent     = al.hub;
  document.getElementById('hud-bal').textContent     = '$' + obSelectedBudget.toLocaleString();
  document.getElementById('hud-day').textContent     = '1';
  document.getElementById('hud-routes').textContent  = '0';
  document.getElementById('hud-ceo-sal').textContent = '$0/day';

  init().then(() => {
    flyTo(al.hub, 2.2);
    setTimeout(() => startTutorial(), 1200);
  });
}

// ── Tutorial system ───────────────────────────────────
const TUTORIAL_STEPS = [
  {
    title: 'Welcome to your empire',
    body:  'This is the world map. Every dot is an airport. Amber dots are major hubs. Click any airport to see details and take action.',
    pos:   { top:'80px', left:'50%', transform:'translateX(-50%)' },
    spotlight: null,
  },
  {
    title: 'Your hub airport',
    body:  'You start at your hub. Click your hub airport on the map — it pulses with an amber ring. Then go to the Actions tab to unlock your first route.',
    pos:   { top:'80px', left:'50%', transform:'translateX(-50%)' },
    spotlight: 'hub',
  },
  {
    title: 'Unlock routes to earn',
    body:  'Each unlocked route earns money every game day. Payback period is ~25 days. The more routes you unlock, the faster your CEO salary grows.',
    pos:   { top:'80px', left:'50%', transform:'translateX(-50%)' },
    spotlight: null,
  },
  {
    title: 'Fly as CEO',
    body:  'Book personal flights to travel the world. You must be physically present at an airport to unlock routes from there — so fly to expand.',
    pos:   { bottom:'100px', left:'50%', transform:'translateX(-50%)' },
    spotlight: null,
  },
];

let tutStep = 0;

function startTutorial() {
  tutStep = 0;
  renderTutStep();
}

function renderTutStep() {
  const tut = document.getElementById('tutorial');
  const step = TUTORIAL_STEPS[tutStep];
  if (!step) { tut.innerHTML = ''; return; }

  tut.innerHTML = `
    <div class="tut-step" style="${Object.entries(step.pos).map(([k,v])=>k+':'+v).join(';')}">
      <div class="tut-step-num">Tip ${tutStep+1} of ${TUTORIAL_STEPS.length}</div>
      <div class="tut-step-title">${step.title}</div>
      <div class="tut-step-body">${step.body}</div>
      <div class="tut-btn-row">
        <button class="tut-btn-next" onclick="advanceTutorial()">${tutStep < TUTORIAL_STEPS.length-1 ? 'Next →' : 'Got it ✓'}</button>
        <button class="tut-btn-skip" onclick="dismissTutorial()">Skip</button>
      </div>
    </div>`;
}

function advanceTutorial() {
  tutStep++;
  if (tutStep >= TUTORIAL_STEPS.length) dismissTutorial();
  else renderTutStep();
}

function dismissTutorial() {
  document.getElementById('tutorial').innerHTML = '';
  showToast('info', 'You\'re on your own now', 'Click any airport to get started. Good luck.');
}

// ── Save / Load ───────────────────────────────────────
const SAVE_KEY = 'skyward_v1';

function getSaveData() {
  return {
    airlineCode:      DEMO.airlineCode,
    airlineName:      DEMO.airlineName,
    hub:              DEMO.hub,
    playerLocation:   DEMO.playerLocation,
    balance:          DEMO.balance,
    day:              DEMO.day,
    dayProgress:      DEMO.dayProgress || 0,
    ceoSalary:        DEMO.ceoSalary,
    ceoBalance:       DEMO.ceoBalance,
    totalEarned:      DEMO.totalEarned,
    lastSalaryMilestone: DEMO.lastSalaryMilestone,
    gameSpeed:        DEMO.gameSpeed || 1,
    unlockedRoutes:   [...DEMO.unlockedRoutes],
    acquiredRoutes:   [...(DEMO.acquiredRoutes  || [])],
    acquiredStarting: [...(DEMO.acquiredStarting || [])],
    ownedAirlines:    DEMO.ownedAirlines || [DEMO.airlineCode],
    ceoBonuses:       DEMO.ceoBonuses   || [],
    earningsHistory:  DEMO.earningsHistory || [],
    flightLog:        DEMO.flightLog    || [],
    unlockedAch:      [...(DEMO.unlockedAch || [])],
    ceoTotalSpent:    DEMO.ceoTotalSpent || 0,
    savedAt:          Date.now(),
  };
}

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(getSaveData()));
    const ind = document.getElementById('save-indicator');
    ind.style.opacity = '1';
    setTimeout(() => { ind.style.opacity = '0'; }, 2000);
  } catch(e) { console.warn('Save failed:', e); }
}

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function applyLoadedGame(data) {
  DEMO.airlineCode    = data.airlineCode;
  DEMO.airlineName    = data.airlineName;
  DEMO.hub            = data.hub;
  DEMO.playerLocation = data.playerLocation;
  DEMO.balance        = data.balance;
  DEMO.day            = data.day;
  DEMO.dayProgress    = data.dayProgress || 0;
  DEMO.ceoSalary      = data.ceoSalary;
  DEMO.ceoBalance     = data.ceoBalance;
  DEMO.totalEarned    = data.totalEarned || 0;
  DEMO.lastSalaryMilestone = data.lastSalaryMilestone ?? -1;
  DEMO.gameSpeed      = data.gameSpeed || 1;
  DEMO.unlockedRoutes  = new Set(data.unlockedRoutes || []);
  DEMO.acquiredRoutes  = new Set(data.acquiredRoutes || []);
  DEMO.acquiredStarting = new Set(data.acquiredStarting || []);
  DEMO.ownedAirlines   = data.ownedAirlines || [data.airlineCode];
  DEMO.ceoBonuses      = data.ceoBonuses || [];
  DEMO.earningsHistory = data.earningsHistory || [];
  DEMO.flightLog       = data.flightLog || [];
  DEMO.unlockedAch     = new Set(data.unlockedAch || []);
  DEMO.ceoTotalSpent   = data.ceoTotalSpent || 0;
  DEMO.gameStartTime   = performance.now();
}

function resumeGame() {
  const data = loadSave();
  if (!data) return;
  applyLoadedGame(data);

  const ob = document.getElementById('onboarding');
  ob.style.transition = 'opacity .4s';
  ob.style.opacity = '0';
  setTimeout(() => { ob.style.display = 'none'; }, 420);

  document.getElementById('hud-airline').textContent = data.airlineName;
  document.getElementById('hud-loc').textContent     = data.playerLocation;
  document.getElementById('hud-bal').textContent     = fmt$(data.balance);
  document.getElementById('hud-day').textContent     = data.day;
  document.getElementById('hud-routes').textContent  = (data.unlockedRoutes.length + (data.acquiredStarting||[]).length);
  document.getElementById('hud-ceo-sal').textContent = fmt$(data.ceoSalary) + '/day';

  init().then(() => {
    flyTo(data.playerLocation, 2.2);
    showToast('success', 'Game resumed', `Day ${data.day} · ${fmt$(data.balance)} · ${data.playerLocation}`);
  });
}

// Auto-save every 30 seconds once game is running
let _gameLaunched = false;
function startAutoSave() {
  if (_gameLaunched) return;
  _gameLaunched = true;
  setInterval(() => {
    if (_gameLaunched) saveGame();
  }, 30000);
}

// ── Init override ─────────────────────────────────────
// Patch init() to be callable post-onboarding without re-doing DEMO
const _originalInit = init;
init = async function() {
  await _originalInit();
  startAutoSave();
};

// ── HUD polish ────────────────────────────────────────
// Update hud-airline label (was hardcoded in HTML)
function refreshHud() {
  document.getElementById('hud-airline').textContent = DEMO.airlineName || DEMO.airlineCode;
  document.getElementById('hud-loc').textContent     = DEMO.playerLocation;
  document.getElementById('hud-bal').textContent     = fmt$(DEMO.balance);
  document.getElementById('hud-day').textContent     = DEMO.day;
  document.getElementById('hud-routes').textContent  = DEMO.unlockedRoutes.size + (DEMO.acquiredStarting||new Set()).size;
  document.getElementById('hud-ceo-sal').textContent = fmt$(DEMO.ceoSalary) + '/day';
}

// ── Boot sequence ─────────────────────────────────────
(function boot() {
  // Render airline grid immediately (data may not be loaded yet)
  renderOnboardingAirlines();

  // Check for saved game
  const saved = loadSave();
  if (saved) {
    const daysSaved = saved.day || 1;
    const airlineName = saved.airlineName || saved.airlineCode;
    document.getElementById('resume-banner').style.display = 'flex';
    document.getElementById('rb-info').textContent =
      `Day ${daysSaved} · ${airlineName} · ${fmt$(saved.balance)}`;
  }
})();

// Re-render airline grid once ROUTES/AIRLINES data is available
// (called at end of init when data is confirmed loaded)
window.addEventListener('skyward-data-loaded', () => {
  renderOnboardingAirlines();
});

</script>
